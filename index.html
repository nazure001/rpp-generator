        const MODEL_PEMBELAJARAN = {
            "Project-Based Learning (PjBL)": { memahami: "Aktivitas: Murid mengamati masalah kontekstual terkait topik dan mendiskusikan rencana proyek penyelesaiannya.", mengaplikasi: "Aktivitas: Murid secara kolaboratif merancang jadwal, membagi tugas, dan mulai membuat prototipe/karya nyata.", merefleksi: "Aktivitas: Murid mempresentasikan hasil karyanya, melakukan uji coba, dan menerima masukan dari kelompok lain.", sumatif: "Penilaian Produk/Proyek (Kriteria: Orisinalitas, Fungsi, Estetika)." },
            "Problem-Based Learning (PBL)": { memahami: "Aktivitas: Murid disajikan sebuah anomali atau kasus nyata terkait topik dan merumuskan pertanyaan/masalah utamanya.", mengaplikasi: "Aktivitas: Murid melakukan investigasi, mengumpulkan data, dan mendiskusikan berbagai alternatif solusi.", merefleksi: "Aktivitas: Murid menyajikan solusi akhir yang disepakati dan mengevaluasi efektivitas solusi tersebut bersama guru.", sumatif: "Penilaian Unjuk Kerja & Laporan Analisis Pemecahan Masalah." },
            "Inquiry Learning": { memahami: "Aktivitas: Guru mendemonstrasikan sebuah fenomena terkait topik. Murid merumuskan hipotesis sementara.", mengaplikasi: "Aktivitas: Murid merancang eksperimen sederhana, mengumpulkan bukti, dan mencatat data hasil pengamatan.", merefleksi: "Aktivitas: Murid menganalisis data untuk membuktikan hipotesis dan mengomunikasikan prinsip dasar yang ditemukan.", sumatif: "Laporan Praktikum/Eksperimen Sistematis." },
            "Discovery Learning": { memahami: "Aktivitas: Murid mengeksplorasi berbagai contoh dan bukan-contoh dari topik yang diberikan oleh guru.", mengaplikasi: "Aktivitas: Murid membandingkan informasi, mengidentifikasi pola, dan membuktikan konsep melalui observasi terarah.", merefleksi: "Aktivitas: Murid melakukan generalisasi (menarik kesimpulan umum) tentang sifat dan aturan dari topik tersebut.", sumatif: "Tes Tertulis / Uraian Pemahaman Konsep." },
            "Jigsaw": { memahami: `Aktivitas: Grup Ahli. Murid dibagi ke dalam kelompok dan setiap anggota menjadi "ahli" untuk satu sub-materi spesifik.`, mengaplikasi: `Aktivitas: Diskusi Silang. Kelompok ahli berdiskusi mendalam, lalu murid kembali ke kelompok asal untuk saling mengajarkan sub-materi ke temannya.`, merefleksi: `Aktivitas: Sintesis. Murid menyatukan semua kepingan informasi menjadi satu pemahaman utuh mengenai topik.`, sumatif: `Kuis Individu komprehensif tentang keseluruhan materi.` },
            "STAD": { memahami: `Aktivitas: Guru menyajikan materi dasar tentang topik secara klasikal.`, mengaplikasi: `Aktivitas: Murid belajar dalam kelompok heterogen untuk memastikan semua anggota benar-benar memahami (tutor sebaya).`, merefleksi: `Aktivitas: Diadakan kuis individu yang nilainya disumbangkan untuk skor tim. Kelompok terbaik diberikan penghargaan.`, sumatif: `Kuis Individu dengan sistem skor kontribusi kelompok.` },
            "TGT (Teams Games Tournament)": { memahami: `Aktivitas: Pengenalan konsep secara interaktif.`, mengaplikasi: `Aktivitas: Kelompok belajar bersama untuk mempersiapkan anggota tim menghadapi turnamen akademik terkait topik.`, merefleksi: `Aktivitas: Perwakilan kelompok berlomba menjawab soal-soal permainan akademik untuk mengumpulkan poin.`, sumatif: `Skor Turnamen Akademik antar kelompok.` },
            "TPS (Think-Pair-Share)": { memahami: `Aktivitas: Think. Guru melempar pertanyaan kompleks tentang topik. Murid diberikan waktu memikirkan jawabannya secara mandiri.`, mengaplikasi: `Aktivitas: Pair. Murid berdiskusi dengan rekan sebangku (berpasangan) untuk menyatukan dan menyempurnakan jawaban.`, merefleksi: `Aktivitas: Share. Pasangan murid membagikan hasil pemikiran mereka ke seluruh kelas untuk ditanggapi.`, sumatif: `Penugasan Esai Pendek / Tanggapan Tertulis.` },
            "NHT (Numbered Heads Together)": { memahami: `Aktivitas: Setiap murid dalam kelompok diberi nomor. Guru mengajukan persoalan tentang topik.`, mengaplikasi: `Aktivitas: Heads Together. Kelompok menyatukan kepala berdiskusi memastikan setiap nomor paham jawaban dari masalah.`, merefleksi: `Aktivitas: Guru memanggil satu nomor acak. Murid dengan nomor tersebut wajib menjawab mewakili kelompoknya.`, sumatif: `Penilaian Partisipasi dan Ketepatan Jawaban Acak.` },
            "CTL (Contextual Teaching and Learning)": { memahami: `Aktivitas: Mengaitkan materi topik dengan pengalaman dan situasi dunia nyata yang dialami murid.`, mengaplikasi: `Aktivitas: Murid melakukan inkuiri dan bekerja sama memecahkan masalah keseharian terkait materi.`, merefleksi: `Aktivitas: Murid melakukan refleksi atas apa yang dipelajari dan memamerkan hasil kerjanya secara otentik.`, sumatif: `Penilaian Portofolio & Rubrik Otentik keseharian.` },
            "RME (Realistic Mathematics/Science Education)": { memahami: `Aktivitas: Memulai pembelajaran dengan masalah/cerita kontekstual terkait topik yang bisa dibayangkan siswa.`, mengaplikasi: `Aktivitas: Murid mengubah masalah nyata tersebut ke dalam bahasa simbolik/rumus (matematisasi).`, merefleksi: `Aktivitas: Membandingkan dan mendiskusikan berbagai cara/strategi penyelesaian masalah yang ditemukan.`, sumatif: `Tes Pemecahan Masalah Realistis (Problem Solving).` },
            "Flipped Classroom": { memahami: `Aktivitas: Review materi dasar topik yang telah dipelajari murid secara mandiri di rumah sebelumnya (via modul/video).`, mengaplikasi: `Aktivitas: Jam kelas difokuskan penuh untuk praktik, tugas kelompok, dan diskusi mendalam memecahkan tantangan.`, merefleksi: `Aktivitas: Guru memberikan umpan balik langsung atas kesulitan tingkat tinggi yang dihadapi murid saat praktik di kelas.`, sumatif: `Penilaian Praktik / Tugas Pendalaman di Kelas.` },
            "Blended / Hybrid Learning": { memahami: `Aktivitas: Eksplorasi. Murid memaparkan hasil penelusuran materi topik yang telah dilakukan secara online.`, mengaplikasi: `Aktivitas: Kolaborasi Luring. Aktivitas tatap muka difokuskan untuk eksperimen/kolaborasi fisik yang tidak bisa dilakukan online.`, merefleksi: `Aktivitas: Menggabungkan pengalaman belajar online dan offline menjadi satu kesimpulan utuh.`, sumatif: `Kuis Online (LMS) Terintegrasi Proyek/Aktivitas Kelas.` },
            "Game-Based Learning": { memahami: `Aktivitas: Pengenalan mekanika permainan/simulasi digital yang memuat tujuan pembelajaran tentang topik.`, mengaplikasi: `Aktivitas: Murid menyelesaikan misi atau tantangan di dalam lingkungan game yang merepresentasikan konsep.`, merefleksi: `Aktivitas: Debriefing. Diskusi menarik makna/konsep ilmiah dari pengalaman bermain game ke dunia nyata.`, sumatif: `Pencapaian Misi (Score/Badge) & Refleksi Tertulis.` },
            "Self-Directed Learning": { memahami: `Aktivitas: Diagnosis. Murid mengidentifikasi secara mandiri apa yang belum ia kuasai mengenai topik.`, mengaplikasi: `Aktivitas: Strategi Mandiri. Murid merumuskan tujuan, memilih sumber belajar, dan mengeksekusi rencana belajarnya.`, merefleksi: `Aktivitas: Evaluasi Diri. Murid mengevaluasi hasil belajarnya sendiri dan menyusun rencana tindak lanjut.`, sumatif: `Jurnal Belajar Mandiri (Learning Log) & Kontrak Belajar.` },
            "Direct Instruction": { memahami: `Aktivitas: Demonstrasi. Guru menyampaikan tujuan dan mendemonstrasikan secara langsung prosedur/langkah-langkah materi.`, mengaplikasi: `Aktivitas: Latihan Terbimbing. Murid meniru atau mempraktikkan keterampilan dasar dengan bimbingan dan koreksi guru.`, merefleksi: `Aktivitas: Latihan Mandiri. Murid melakukan praktik secara mandiri untuk memantapkan penguasaan prosedural.`, sumatif: `Tes Praktik / Keterampilan Prosedural.` },
            "Mastery Learning": { memahami: `Aktivitas: Materi topik disajikan dalam unit-unit kecil yang sangat terstruktur.`, mengaplikasi: `Aktivitas: Murid berlatih. Yang belum tuntas diberikan remedial instan, yang sudah tuntas diberikan pengayaan.`, merefleksi: `Aktivitas: Memastikan seluruh murid mencapai standar ketuntasan minimal sebelum berpindah ke unit berikutnya.`, sumatif: `Tes Formatif/Sumatif Berulang hingga Mencapai Ketuntasan.` },
            "TGfU (Teaching Games for Understanding)": { memahami: `Aktivitas: Murid diperkenalkan pada permainan taktis sederhana yang memuat elemen konsep.`, mengaplikasi: `Aktivitas: Murid memodifikasi atau membuat keputusan taktis secara langsung di lapangan terkait penyelesaian masalah.`, merefleksi: `Aktivitas: Mengidentifikasi keterampilan/teknik spesifik apa yang perlu diperbaiki untuk meningkatkan performa.`, sumatif: `Penilaian Kinerja Taktis (Tactical Performance).` }
        };

        const getModelData = (metode) => MODEL_PEMBELAJARAN[metode] || MODEL_PEMBELAJARAN["Problem-Based Learning (PBL)"];

        // Aspek Formatif Siswa (Disesuaikan secara psikologis dengan Indikator PMM Guru)
        const ASPEK_MURID_MAP = {
            "Disiplin Positif": "1. Tanggung jawab terhadap konsekuensi tindakan dalam kelompok.\n2. Kemampuan refleksi diri dan pengendalian emosi saat menghadapi kesulitan.",
            "Keteraturan Suasana Kelas": "1. Kepatuhan pada kesepakatan kelas dan aturan main.\n2. Kolaborasi dan interaksi positif sesama anggota kelompok.",
            "Umpan Balik Konstruktif": "1. Keterbukaan menerima masukan atau kritik dari teman/guru.\n2. Kemampuan memberikan umpan balik (peer-review) yang objektif ke teman.",
            "Perhatian dan Kepedulian": "1. Sikap empati dan kepedulian terhadap teman yang kesulitan.\n2. Respons positif dan toleransi terhadap perbedaan karakteristik rekan.",
            "Ekspektasi pada Peserta Didik": "1. Kegigihan (Grit) dan pantang menyerah dalam menyelesaikan tantangan tugas.\n2. Kepercayaan diri dalam menunjukkan potensi dan mempresentasikan hasil.",
            "Aktivitas Interaktif": "1. Tingkat partisipasi dan inisiatif dalam mengemukakan pendapat.\n2. Kualitas argumen dan keterlibatan diskusi dua arah dengan teman.",
            "Instruksi yang Adaptif": "1. Respon adaptif terhadap variasi tugas (diferensiasi) yang diberikan.\n2. Kemampuan merefleksikan proses belajar dan capaiannya sendiri.",
            "Instruksi Pembelajaran": "1. Pemahaman mendetail terhadap instruksi dan langkah kerja materi.\n2. Kemampuan mengaitkan teori materi dengan konteks keseharian/nyata."
        };

        // --- SMART ENGINE LOGIC ---
        const SmartEngine = {
            getLingkupMateri: (topik, mapel, metode) => {
                const t = topik || "[Topik]";
                const m = (mapel || "").toLowerCase();
                if (m.includes("bahasa") || m.includes("sastra") || m.includes("english") || m.includes("inggris")) return `Analisis Struktur, Kebahasaan, dan Pemecahan Masalah pada Materi ${t}`;
                
                const kooperatif = ["Jigsaw", "STAD", "TGT (Teams Games Tournament)", "TPS (Think-Pair-Share)", "NHT (Numbered Heads Together)"];
                const kontekstual = ["CTL (Contextual Teaching and Learning)", "RME (Realistic Mathematics/Science Education)"];
                const teknologi = ["Flipped Classroom", "Blended / Hybrid Learning", "Game-Based Learning", "Self-Directed Learning"];
                const instruksional = ["Direct Instruction", "Mastery Learning", "TGfU (Teaching Games for Understanding)"];

                if (metode === "Project-Based Learning (PjBL)") return `Perancangan Proyek dan Penerapan Praktis Konsep ${t}`;
                if (metode === "Problem-Based Learning (PBL)") return `Analisis Kasus dan Pemecahan Masalah Kontekstual pada ${t}`;
                if (metode === "Discovery Learning" || metode === "Inquiry Learning") return `Penyelidikan Ilmiah, Penemuan Pola, dan Eksplorasi Logika pada ${t}`;
                if (kooperatif.includes(metode)) return `Kajian Kolaboratif dan Diskusi Mendalam mengenai Konsep ${t}`;
                if (kontekstual.includes(metode)) return `Kajian Kontekstual dan Penerapan Nyata pada Materi ${t}`;
                if (teknologi.includes(metode)) return `Eksplorasi Digital dan Analisis Interaktif pada Materi ${t}`;
                if (instruksional.includes(metode)) return `Penguasaan Keterampilan Dasar dan Praktik Prosedural terkait ${t}`;
                return `Eksplorasi Konsep dan Aplikasi Praktis ${t}`;
            },

            getKesiapan: (topik, mapel) => ({
                konsep: `Sebagian besar siswa mungkin sudah pernah berinteraksi dengan fenomena/konsep "${topik}" dalam kehidupan sehari-hari, namun pemahaman logis terkait mata pelajaran ${mapel} masih perlu pendalaman.`,
                teknis: `Siswa membutuhkan panduan guru untuk menyusun kerangka berpikir atau menggunakan instrumen khusus terkait ${topik}.`,
                mental: `Membangun iklim kelas yang inklusif agar siswa tidak ragu berpendapat atau bereksperimen membedah masalah ${topik}.`
            }),

            generatePengalamanBelajar: (topik, mapel, metode, indikator, fokusPMM) => {
                const mod = getModelData(metode);
                const dataIndikator = DATA_PMM_FULL[indikator];

                let actsAwal = [];
                let actsInti = [];
                let actsAkhir = [];

                if (fokusPMM === "Semua Fokus") {
                    const keys = Object.keys(dataIndikator);
                    actsAwal = [dataIndikator[keys[0]][0], dataIndikator[keys[1]][0], dataIndikator[keys[2]][0]];
                    actsInti = [dataIndikator[keys[0]][1], dataIndikator[keys[1]][1], dataIndikator[keys[2]][1]];
                    actsAkhir = [dataIndikator[keys[0]][2], dataIndikator[keys[1]][2], dataIndikator[keys[2]][2]];
                } else {
                    const fData = dataIndikator[fokusPMM];
                    if(fData) {
                        actsAwal = [fData[0]];
                        actsInti = [fData[1]];
                        actsAkhir = [fData[2]];
                    }
                }

                const buildMulti = (arr) => {
                    if (!arr || arr.length === 0) return "";
                    if (arr.length === 1) return `**Guru ${arr[0]}**`;
                    return `**Guru ${arr[0]}**, **${arr[1]}**, serta **${arr[2]}**`;
                };

                let inti1_pmm = "";
                let inti2_pmm = "";
                let inti3_pmm = "";

                    inti2_pmm = `- Sebagai fasilitator aktif, **guru ${actsInti[0]}**.`;
                }

                return {
                    awal: `- Guru mengucapkan salam, mengecek kehadiran, dan memimpin doa kelas.\n- Dalam proses persiapan dan orientasi, ${buildMulti(actsAwal)}.\n- Guru mengajukan pertanyaan apersepsi yang mengaitkan fenomena ${topik || "[Topik]"} dengan konsep ${mapel || "[Mapel]"} sebelumnya.\n- Guru menyampaikan tujuan pembelajaran.`,

                    inti2: `${mod.mengaplikasi}\n\n${inti2_pmm}`,
                    inti3: `${mod.merefleksi}\n\n${inti3_pmm ? inti3_pmm : "- Guru memfasilitasi pelurusan miskonsepsi (jika ada) terkait materi."}`,
                    penutup: `- Guru bersama murid menyimpulkan esensi pembelajaran tentang ${topik || "[Topik]"}.\n- Pada tahap resolusi dan evaluasi, ${buildMulti(actsAkhir)}.\n- Guru menutup kegiatan dengan doa dan pesan motivasi.`

                else if (metode === "Problem-Based Learning (PBL)") soalSumatif = `STUDI KASUS:\nAnalisislah sebuah permasalahan nyata terkait "${t}" dan formulasikan solusinya!\n\nKriteria Penilaian:\n1. Kedalaman Analisis Masalah (30%)\n2. Kelogisan Solusi (40%)\n3. Kerjasama Kelompok (30%)`;

                return { instAwal: soalAwal, formAspek: ASPEK_MURID_MAP[indikator], formLegend: legend, instSumatif: soalSumatif };

                                        <h3 className="font-bold text-xl text-white flex items-center gap-2"><i data-lucide="play-circle" className="w-5 h-5 text-brand-500"></i> Kegiatan Inti ({formData.metode})</h3>
                                        <AreaGroup label="Tahap 1: Memahami" name="kegiatanInti1" val={formData.kegiatanInti1} change={handleInputChange} rows={3} />
                                        <AreaGroup label="Tahap 2: Mengaplikasi" name="kegiatanInti2" val={formData.kegiatanInti2} change={handleInputChange} rows={3} />
                                        <AreaGroup label="Tahap 3: Merefleksi" name="kegiatanInti3" val={formData.kegiatanInti3} change={handleInputChange} rows={3} />
                                    </div>
                                    
                                    <AreaGroup label="3. Penutup (Berkesadaran, Bermakna)" name="kegiatanPenutup" val={formData.kegiatanPenutup} change={handleInputChange} rows={5} />
                                    
                                    <div className="flex justify-between pt-4"><ButtonSecondary onClick={() => setStep(2)}>Kembali</ButtonSecondary><ButtonPrimary onClick={() => setStep(4)} icon="arrow-right">Lanjut Asesmen</ButtonPrimary></div>
                                </div>
                            )}

                            {/* TAHAP 4 */}
                            {step === 4 && (
                                <div className="glass-panel p-10 rounded-3xl space-y-10 animate-fade-in">
                                    <div>
                                        <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-2"><i data-lucide="check-square" className="w-6 h-6 text-brand-500"></i> Rencana Asesmen</h2>
                                        <div className="grid md:grid-cols-3 gap-6">
                                            <AreaGroup label="Awal (Diagnostik)" name="asesmenAwal" val={formData.asesmenAwal} change={handleInputChange} rows={5} />
                                            <AreaGroup label="Formatif (Proses)" name="asesmenFormatif" val={formData.asesmenFormatif} change={handleInputChange} rows={5} />
                                            <AreaGroup label="Sumatif (Akhir)" name="asesmenSumatif" val={formData.asesmenSumatif} change={handleInputChange} rows={5} />
                                        </div>
                                    </div>

                                    <div className="pt-8 border-t border-slate-700/50">
                                        <h2 className="text-2xl font-bold text-white mb-2 flex items-center gap-2"><i data-lucide="life-buoy" className="w-6 h-6 text-red-500"></i> Posko Solusi (Troubleshooting)</h2>
                                        <div className="space-y-4 mt-6">
                                            {formData.troubleshooting.map((item, idx) => (
                                                <div key={idx} className="grid grid-cols-1 md:grid-cols-3 gap-3 bg-slate-900/60 p-4 rounded-xl border border-slate-700/50">
                                                    <input type="text" value={item.masalah} onChange={(e) => updateTrouble(idx, 'masalah', e.target.value)} className="p-3 text-sm rounded-lg outline-none bg-slate-950/80 text-red-400 font-medium" placeholder="Masalah" />
                                                    <input type="text" value={item.penyebab} onChange={(e) => updateTrouble(idx, 'penyebab', e.target.value)} className="p-3 text-sm rounded-lg outline-none bg-slate-950/80" placeholder="Penyebab" />
                                                    <input type="text" value={item.solusi} onChange={(e) => updateTrouble(idx, 'solusi', e.target.value)} className="p-3 text-sm rounded-lg outline-none bg-slate-950/80 text-emerald-400 font-medium" placeholder="Solusi" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex justify-between pt-4"><ButtonSecondary onClick={() => setStep(3)}>Kembali</ButtonSecondary><ButtonPrimary onClick={() => setStep(5)} icon="arrow-right">Lanjut Instrumen</ButtonPrimary></div>
                                </div>
                            )}

                            {/* TAHAP 5 */}
                            {step === 5 && (
                                <div className="glass-panel p-10 rounded-3xl space-y-8 animate-fade-in">
                                    <h2 className="text-2xl font-bold text-white flex items-center gap-2"><i data-lucide="file-text" className="w-6 h-6 text-brand-500"></i> Instrumen Asesmen & Rubrik</h2>
                                    <div className="space-y-8">
                                        <div className="p-6 bg-slate-900/50 rounded-2xl border border-slate-700/50">
                                            <AreaGroup label="1. Instrumen Asesmen Awal (Diagnostik)" name="instrumenAwal" val={formData.instrumenAwal} change={handleInputChange} rows={4} />
                                        </div>
                                        <div className="p-6 bg-slate-900/50 rounded-2xl border border-slate-700/50">
                                            <h3 className="font-bold text-white mb-4 text-lg">2. Tabel Formatif Siswa (Untuk Indikator PMM: {formData.indikator})</h3>
                                            <div className="grid md:grid-cols-2 gap-6">
                                                <AreaGroup label="Daftar Aspek yang Diamati (Baris Tabel)" name="instrumenFormatifAspek" val={formData.instrumenFormatifAspek} change={handleInputChange} rows={6} />
                                                <AreaGroup label="Keterangan / Legend" name="instrumenFormatifLegend" val={formData.instrumenFormatifLegend} change={handleInputChange} rows={6} />
                                            </div>
                                        </div>
                                        <div className="p-6 bg-slate-900/50 rounded-2xl border border-slate-700/50">
                                            <AreaGroup label={`3. Instrumen Sumatif (${formData.metode})`} name="instrumenSumatif" val={formData.instrumenSumatif} change={handleInputChange} rows={5} />
                                        </div>
                                    </div>
                                    <div className="flex justify-between pt-6 border-t border-slate-700/50"><ButtonSecondary onClick={() => setStep(4)}>Kembali</ButtonSecondary><ButtonPrimary onClick={() => setIsGenerated(true)} icon="printer">Generate PDF</ButtonPrimary></div>
                                </div>
                            )}
                        </div>

                        {/* OUTPUT PREVIEW SECTION */}
                        {isGenerated && (
                            <div className="pb-20 animate-fade-in">
                                <div className="flex justify-between items-center mb-8 no-print glass-panel p-6 rounded-2xl">
                                    <h2 className="text-2xl font-bold text-white">Dokumen RPP Siap Cetak</h2>
                                    <div className="flex gap-4">
                                        <button onClick={() => window.print()} className="bg-white text-slate-900 px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-200 shadow-lg"><i data-lucide="printer" className="w-5 h-5"></i> Cetak PDF</button>
                                        <button onClick={() => setIsGenerated(false)} className="bg-slate-800 text-white border border-slate-600 px-6 py-2.5 rounded-xl font-bold hover:bg-slate-700"><i data-lucide="edit" className="w-5 h-5 inline mr-2"></i>Edit RPP</button>
                                    </div>
                                </div>

                                {/* A4 Document 1 */}
                                <div className="bg-white text-black p-12 shadow-2xl mx-auto max-w-[210mm] min-h-[297mm] text-[13px] leading-[1.6]">
                                    <div className="text-center border-b-[3px] border-double border-black pb-4 mb-6">
                                        <h1 className="text-xl font-bold uppercase tracking-wide">PERENCANAAN PEMBELAJARAN (RPP)</h1>
                                        <h2 className="font-semibold uppercase text-[15px] mt-1">{formData.mapel} (DEEP LEARNING)</h2>
                                    </div>

                                    <table className="w-full mb-6 border-collapse">
                                        <tbody>
                                            <tr><td className="font-bold w-[120px] py-1 align-top">Nama Sekolah</td><td className="w-2 align-top">:</td><td className="align-top pr-4">{formData.sekolah}</td><td className="font-bold w-[120px] py-1 align-top">Lingkup Materi</td><td className="w-2 align-top">:</td><td className="align-top">{formData.lingkupMateri}</td></tr>
                                            <tr><td className="font-bold py-1 align-top">Mata Pelajaran</td><td className="align-top">:</td><td className="align-top pr-4">{formData.mapel}</td><td className="font-bold py-1 align-top">Alokasi Waktu</td><td className="align-top">:</td><td className="align-top">{formData.waktu}</td></tr>
                                            <tr><td className="font-bold py-1 align-top">Kelas/Semester</td><td className="align-top">:</td><td className="align-top pr-4">{formData.kelas}</td><td className="font-bold py-1 align-top">Guru Pengampu</td><td className="align-top">:</td><td className="align-top">{formData.guru}</td></tr>
                                        </tbody>
                                    </table>

                                    <div className="mb-5">
                                        <h3 className="font-bold bg-slate-100 p-1.5 mb-2 uppercase border border-slate-300">I. IDENTIFIKASI & KARAKTERISTIK</h3>
                                        <div className="ml-2">
                                            <p className="font-bold underline mb-1">A. Kesiapan Murid</p>
                                            <ul className="list-disc ml-6 mb-2">
                                                <li className="mb-0.5"><strong>Konsep (Mindful):</strong> {formData.kesiapanKonsep}</li>
                                                <li className="mb-0.5"><strong>Teknis (Psikomotor):</strong> {formData.kesiapanTeknis}</li>
                                                <li className="mb-0.5"><strong>Mental (Joyful):</strong> {formData.kesiapanMental}</li>
                                            </ul>
                                            <p className="font-bold underline mb-1">B. Karakteristik Materi</p>
                                            <p className="mb-2 text-justify">{formData.karakteristikMateri}</p>
                                            <p className="font-bold underline mb-1">C. Dimensi Profil Lulusan</p>
                                            <p>{formData.dpl.join(", ")}</p>
                                        </div>
                                    </div>

                                    <div className="mb-5">
                                        <h3 className="font-bold bg-slate-100 p-1.5 mb-2 uppercase border border-slate-300">II. DESAIN PEMBELAJARAN</h3>
                                        <div className="ml-2">
                                            <p className="mb-1 text-justify"><strong>Tujuan Pembelajaran:</strong> {formData.tujuanPembelajaran}</p>
                                            <p className="mb-1"><strong>Indikator Kinerja PMM:</strong> {formData.indikator} <span className="italic font-normal">({formData.fokusPMM})</span></p>
                                            <p className="mb-1"><strong>Model Pembelajaran:</strong> {formData.metode}</p>
                                            <p className="mb-1"><strong>Kemitraan Pembelajaran:</strong> {formData.kemitraan}</p>
                                        </div>
                                    </div>

                                    <div className="mb-6">
                                        <h3 className="font-bold bg-slate-100 p-1.5 mb-2 uppercase border border-slate-300">III. PENGALAMAN BELAJAR</h3>
                                        <div className="mb-3 ml-2"><p className="font-bold underline mb-1">1. Pendahuluan</p><div className="ml-2 pl-2 border-l-2 border-slate-200">{formatText(formData.kegiatanAwal)}</div></div>
                                        <div className="mb-3 ml-2">
                                            <p className="font-bold underline mb-1">2. Kegiatan Inti</p>
                                            <table className="w-full border-collapse border border-black mt-2">
                                                <thead><tr className="bg-slate-50"><th className="border border-black p-2 text-left w-[28%]">Tahapan</th><th className="border border-black p-2 text-left">Aktivitas Pembelajaran</th></tr></thead>
                                                <tbody>
                                                    <tr><td className="border border-black p-2 align-top font-bold">1. Memahami<br/><span className="text-[11px] font-normal italic">(Berkesadaran)</span></td><td className="border border-black p-2 align-top">{formatText(formData.kegiatanInti1)}</td></tr>
                                                    <tr><td className="border border-black p-2 align-top font-bold">2. Mengaplikasi<br/><span className="text-[11px] font-normal italic">(Bermakna)</span></td><td className="border border-black p-2 align-top">{formatText(formData.kegiatanInti2)}</td></tr>
                                                    <tr><td className="border border-black p-2 align-top font-bold">3. Merefleksi<br/><span className="text-[11px] font-normal italic">(Menggembirakan)</span></td><td className="border border-black p-2 align-top">{formatText(formData.kegiatanInti3)}</td></tr>
                                                </tbody>
                                            </table>
                                        </div>
                                        <div className="ml-2"><p className="font-bold underline mb-1">3. Penutup</p><div className="ml-2 pl-2 border-l-2 border-slate-200">{formatText(formData.kegiatanPenutup)}</div></div>
                                    </div>
                                    
                                    <div className="page-break-inside-avoid">
                                        <h3 className="font-bold bg-slate-100 p-1.5 mb-2 uppercase border border-slate-300">IV. ASESMEN & LAMPIRAN</h3>
                                        <div className="grid grid-cols-3 gap-3 mb-5">
                                            <div className="border border-black p-2"><p className="font-bold text-center border-b border-black pb-1 mb-1.5">Awal</p><p className="text-[12px]">{formData.asesmenAwal}</p></div>
                                            <div className="border border-black p-2"><p className="font-bold text-center border-b border-black pb-1 mb-1.5">Formatif</p><p className="text-[12px]">{formData.asesmenFormatif}</p></div>
                                            <div className="border border-black p-2"><p className="font-bold text-center border-b border-black pb-1 mb-1.5">Sumatif</p><p className="text-[12px]">{formData.asesmenSumatif}</p></div>
                                        </div>

                                        <p className="font-bold mb-1.5 underline">POSKO SOLUSI (Panduan Troubleshooting)</p>
                                        <table className="w-full border-collapse border border-black text-[12px]">
                                            <thead><tr className="bg-slate-50"><th className="border border-black p-2 text-left w-[30%]">Masalah yang Terjadi</th><th className="border border-black p-2 text-left w-[35%]">Mengapa Terjadi?</th><th className="border border-black p-2 text-left">Langkah Solusi</th></tr></thead>
                                            <tbody>
                                                {formData.troubleshooting.map((t, i) => (
                                                    <tr key={i}><td className="border border-black p-2 font-bold">{t.masalah}</td><td className="border border-black p-2">{t.penyebab}</td><td className="border border-black p-2">{t.solusi}</td></tr>
                                                ))}
                                            </tbody>
                                        </table>
                                        
                                        <div className="mt-16 flex justify-between text-[13px] font-bold page-break-inside-avoid">
                                            <div className="text-center w-56">
                                                <p>Mengetahui,</p>
                                                <p>Kepala Sekolah</p>
                                                <br/><br/><br/>
                                                <p className="border-b border-black inline-block min-w-[150px] pb-1">{formData.kepalaSekolah || "........................................"}</p>
                                                <p className="mt-1 font-normal">NIP. {formData.nipKepalaSekolah || "........................"}</p>
                                            </div>
                                            <div className="text-center w-56">
                                                <p>Guru Mata Pelajaran</p>
                                                <br/><br/><br/>
                                                <p className="border-b border-black inline-block min-w-[150px] pb-1">{formData.guru || "........................................"}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* A4 Document 2 - LAMPIRAN */}
                                <div className="bg-white text-black p-12 shadow-2xl mx-auto max-w-[210mm] min-h-[297mm] page-break mt-10 text-[13px] leading-[1.6]">
                                    <div className="text-center border-b-[3px] border-double border-black pb-4 mb-8">
                                        <h1 className="text-xl font-bold uppercase tracking-wide">LAMPIRAN INSTRUMEN ASESMEN</h1>
                                    </div>
                                    <div className="space-y-8">
                                        <div>
                                            <div className="font-bold bg-slate-100 p-1.5 mb-3 uppercase border border-slate-300">1. ASESMEN AWAL (DIAGNOSTIK)</div>
                                            <div className="border border-black p-5 whitespace-pre-line">{formData.instrumenAwal}</div>
                                        </div>
                                        <div>
                                            <div className="font-bold bg-slate-100 p-1.5 mb-2 uppercase border border-slate-300">2. LEMBAR OBSERVASI FORMATIF SISWA</div>
                                            <table className="w-full border-collapse border border-black text-[12px] mb-4 mt-3">
                                                <thead>
                                                    <tr className="bg-slate-50"><th className="border border-black p-2.5 w-[40%] text-left">Aspek Sikap yang Diamati</th><th className="border border-black p-2.5 text-center w-[15%]">Baru Memulai</th><th className="border border-black p-2.5 text-center w-[15%]">Berkembang</th><th className="border border-black p-2.5 text-center w-[15%]">Cakap</th><th className="border border-black p-2.5 text-center w-[15%]">Mahir</th></tr>
                                                </thead>
                                                <tbody>
                                                    {formData.instrumenFormatifAspek.split('\n').filter(a => a.trim() !== '').map((aspek, i) => (
                                                        <tr key={i}><td className="border border-black p-3">{aspek}</td><td className="border border-black p-3"></td><td className="border border-black p-3"></td><td className="border border-black p-3"></td><td className="border border-black p-3"></td></tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                            <div className="border border-black p-4 bg-slate-50">
                                                <p className="font-bold mb-1.5 text-[12px]">Keterangan / Legend Penilaian:</p>
                                                <ul className="list-disc ml-5 space-y-1 text-[11px]">
                                                    {formData.instrumenFormatifLegend.split('\n').filter(l => l.trim() !== '').map((leg, idx) => <li key={idx}>{leg}</li>)}
                                                </ul>
                                            </div>
                                        </div>
                                        <div className="page-break-inside-avoid">
                                            <div className="font-bold bg-slate-100 p-1.5 mb-3 uppercase border border-slate-300">3. INSTRUMEN SUMATIF</div>
                                            <div className="border border-black p-5 whitespace-pre-line">{formData.instrumenSumatif}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Floating Author Signature */}
                    <div className="fixed bottom-6 right-6 z-50 no-print group">
                        <div className="bg-[#0b111d]/80 backdrop-blur-xl border border-white/10 rounded-2xl p-3 flex flex-col gap-2.5 shadow-[0_10px_40px_rgba(0,0,0,0.8)] hover:border-white/20 hover:-translate-y-1 transition-all duration-300">
                            <div className="text-[10px] uppercase tracking-widest text-slate-500 font-bold px-1 group-hover:text-brand-400 transition-colors">Crafted By</div>
                            <div className="flex items-center gap-3 bg-white/5 px-3 py-2.5 rounded-xl border border-white/5 cursor-default hover:bg-white/10 transition-colors" title="Minecraft Nametag">
                                <i data-lucide="gamepad-2" className="w-4 h-4 text-emerald-400 drop-shadow-[0_0_8px_rgba(52,211,153,0.8)]"></i>
                                <span className="text-xs font-bold text-slate-200 tracking-wide">nazure_02</span>
                            </div>
                            <a href="https://instagram.com/purwaumbara" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 bg-white/5 px-3 py-2.5 rounded-xl border border-white/5 hover:bg-white/10 hover:border-pink-500/50 transition-colors" title="Instagram">
                                <i data-lucide="instagram" className="w-4 h-4 text-pink-400 drop-shadow-[0_0_8px_rgba(244,114,182,0.8)]"></i>
                                <span className="text-xs font-bold text-slate-200 tracking-wide">@purwaumbara</span>
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
