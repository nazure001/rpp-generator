            "RME (Realistic Mathematics/Science Education)": { memahami: `Masalah Realistis: Memulai pembelajaran dengan masalah/cerita kontekstual terkait topik yang bisa dibayangkan siswa.`, mengaplikasi: `Matematisasi: Murid mengubah masalah nyata tersebut ke dalam bahasa simbolik/rumus (matematisasi).`, merefleksi: `Interaktivitas: Membandingkan dan mendiskusikan berbagai cara/strategi penyelesaian masalah yang ditemukan.`, sumatif: `Tes Pemecahan Masalah Realistis (Problem Solving).` },
            "Flipped Classroom": { memahami: `Pra-Kelas: Review materi dasar topik yang telah dipelajari murid secara mandiri di rumah sebelumnya (via modul/video).`, mengaplikasi: `Aktivitas Kelas: Jam kelas difokuskan penuh untuk praktik, tugas kelompok, dan diskusi mendalam memecahkan tantangan.`, merefleksi: `Penguatan: Guru memberikan umpan balik langsung atas kesulitan tingkat tinggi yang dihadapi murid saat praktik di kelas.`, sumatif: `Penilaian Praktik / Tugas Pendalaman di Kelas.` },
            "Blended / Hybrid Learning": { memahami: `Eksplorasi Daring: Murid memaparkan hasil penelusuran materi topik yang telah dilakukan secara online.`, mengaplikasi: `Kolaborasi Luring: Aktivitas tatap muka difokuskan untuk eksperimen/kolaborasi fisik yang tidak bisa dilakukan online.`, merefleksi: `Sinkronisasi: Menggabungkan pengalaman belajar online dan offline menjadi satu kesimpulan utuh.`, sumatif: `Kuis Online (LMS) Terintegrasi Proyek/Aktivitas Kelas.` },
            "Game-Based Learning": { memahami: `Aturan Main: Pengenalan mekanika permainan/simulasi digital yang memuat tujuan pembelajaran tentang topik.`, mengaplikasi: `Bermain/Simulasi: Murid menyelesaikan misi atau tantangan di dalam lingkungan game yang merepresentasikan konsep.`, merefleksi: `Debriefing: Diskusi menarik makna/konsep ilmiah dari pengalaman bermain game ke dunia nyata.`, sumatif: `Pencapaian Misi (Score/Badge) & Refleksi Tertulis.` },
            "Self-Directed Learning": { memahami: `Diagnosis: Murid mengidentifikasi secara mandiri apa yang belum ia kuasai mengenai topik.`, mengaplikasi: `Strategi Mandiri: Murid merumuskan tujuan, memilih sumber belajar, dan mengeksekusi rencana belajarnya.`, merefleksi: `Evaluasi Diri: Murid mengevaluasi hasil belajarnya sendiri dan menyusun rencana tindak lanjut.`, sumatif: `Jurnal Belajar Mandiri (Learning Log) & Kontrak Belajar.` },
            "Direct Instruction": { memahami: `Demonstrasi: Guru menyampaikan tujuan dan mendemonstrasikan secara langsung prosedur/langkah-langkah materi.`, mengaplikasi: `Latihan Terbimbing: Murid meniru atau mempraktikkan keterampilan dasar dengan bimbingan dan koreksi guru.`, merefleksi: `Latihan Mandiri: Murid melakukan praktik secara mandiri untuk memantapkan penguasaan prosedural.`, sumatif: `Tes Praktik / Keterampilan Prosedural.` },
            "Mastery Learning": { memahami: `Penyajian Blok: Materi topik disajikan dalam unit-unit kecil yang sangat terstruktur.`, mengaplikasi: `Latihan & Remedial: Murid berlatih. Yang belum tuntas diberikan remedial instan, yang sudah tuntas diberikan pengayaan.`, merefleksi: `Ketuntasan: Memastikan seluruh murid mencapai standar ketuntasan minimal sebelum berpindah ke unit berikutnya.`, sumatif: `Tes Formatif/Sumatif Berulang hingga Mencapai Ketuntasan.` },
            "TGfU (Teaching Games for Understanding)": { memahami: `Apresiasi Game: Murid diperkenalkan pada permainan taktis sederhana yang memuat elemen konsep.`, mengaplikasi: `Kesadaran Taktis: Murid memodifikasi atau membuat keputusan taktis secara langsung di lapangan terkait penyelesaian masalah.`, merefleksi: `Eksekusi Keterampilan: Mengidentifikasi keterampilan/teknik spesifik apa yang perlu diperbaiki untuk meningkatkan performa.`, sumatif: `Penilaian Kinerja Taktis (Tactical Performance).` }
        };

        const getModelData = (metode) => MODEL_PEMBELAJARAN[metode] || MODEL_PEMBELAJARAN["Problem-Based Learning (PBL)"];

        const ASPEK_MURID_MAP = {
            "Disiplin Positif": "1. Tanggung jawab terhadap konsekuensi tindakan.\n2. Kemampuan refleksi diri dan kontrol emosi.",
            "Keteraturan Suasana Kelas": "1. Kepatuhan pada kesepakatan belajar kelas.\n2. Tingkat partisipasi aktif kolaboratif kelompok.",
            "Umpan Balik Konstruktif": "1. Keterbukaan menerima masukan perbaikan dari teman/guru.\n2. Kemampuan memberikan feedback objektif.",
            "Perhatian dan Kepedulian": "1. Sikap empati membantu rekan yang kesulitan.\n2. Rasa percaya diri dalam memaparkan opini.",
            "Ekspektasi pada Peserta Didik": "1. Kegigihan (Grit) menyelesaikan tugas menantang.\n2. Kemandirian pengerjaan target indikator.",
            "Aktivitas Interaktif": "1. Keaktifan berpendapat dalam forum diskusi.\n2. Menghargai perbedaan argumen rekan.",
            "Instruksi yang Adaptif": "1. Respon terhadap variasi tingkat kesulitan tugas.\n2. Kedisiplinan melakukan evaluasi berkala.",
            "Instruksi Pembelajaran": "1. Pemahaman runtut alur prosedural instruksi.\n2. Ketepatan aplikasi contoh kontekstual materi."
        };

        // --- SMART ENGINE LOGIC ---
        const SmartEngine = {
            getLingkupMateri: (topik, mapel, metode, elemen) => {
                const t = topik || "[Topik]";
                const el = elemen || "[Elemen]";
                const m = (mapel || "").toLowerCase();
                const isBahasa = m.includes("bahasa") || m.includes("sastra") || m.includes("english") || m.includes("inggris");
                
                if (isBahasa) return `Kajian Elemen ${el}: Struktur, Kebahasaan, dan Refleksi Kontekstual pada Materi ${t}`;
                return `Eksplorasi Kompetensi Elemen ${el}: Penerapan Praktis dan Pendalaman Teoretis ${t} Berbasis Pendekatan ${metode}`;
            },

            getKesiapan: (topik, mapel) => ({
                konsep: `Sebagian besar siswa sudah berinteraksi dengan fenomena materi "${topik || '[Topik]'}" secara parsial di keseharian, namun pemahaman mendalam secara akademis pada rumpun mapel ${mapel || '[Mapel]'} memerlukan jembatan konsep yang terstruktur.`,
                teknis: `Siswa membutuhkan orientasi prosedural untuk menggunakan instrumen berpikir atau piranti teknis guna mengolah data terkait ${topik || '[Topik]'}.`,
                mental: `Menciptakan zona belajar bebas perundungan agar siswa memiliki ketahanan mental untuk bereksplorasi tanpa rasa takut salah.`
            }),

            generatePengalamanBelajar: (topik, mapel, metode, indikator, fokusPMM) => {
                const mod = getModelData(metode);
                const dataIndikator = DATA_PMM_FULL[indikator];

                let actsAwal = [];
                let actsInti = [];
                let actsAkhir = [];

                if (fokusPMM === "Semua Fokus") {
                    const keys = Object.keys(dataIndikator);
                    actsAwal = [dataIndikator[keys[0]][0], dataIndikator[keys[1]][0], dataIndikator[keys[2]][0]];
                    actsInti = [dataIndikator[keys[0]][1], dataIndikator[keys[1]][1], dataIndikator[keys[2]][1]];
                    actsAkhir = [dataIndikator[keys[0]][2], dataIndikator[keys[1]][2], dataIndikator[keys[2]][2]];
                } else {
                    const fData = dataIndikator[fokusPMM];
                    if(fData) {
                        actsAwal = [fData[0]];
                        actsInti = [fData[1]];
                        actsAkhir = [fData[2]];
                    }
                }

                const buildMulti = (arr) => {
                    if (!arr || arr.length === 0) return "";
                    if (arr.length === 1) return `**Guru ${arr[0]}**`;
                    return `**Guru ${arr[0]}**, **${arr[1]}**, serta proaktif **${arr[2]}**`;
                };

                let inti1_pmm = "";
                let inti2_pmm = "";
                let inti3_pmm = "";

                if (fokusPMM === "Semua Fokus") {
                    inti1_pmm = `- Di awal fase pemecahan, **guru secara asertif ${actsInti[0]}**.`;
                    inti2_pmm = `- Saat murid mengaplikasikan instruksi, **guru berkeliling guna ${actsInti[1]}**.`;
                    inti3_pmm = `- Pada sesi penarikan makna, **guru memandu jalannya kelas serta ${actsInti[2]}**.`;
                } else {
                    inti2_pmm = `- Sebagai aksi nyata observasi PMM, **guru senantika proaktif ${actsInti[0]}**.`;
                }

                return {
                    awal: `- Guru membuka kelas dengan salam hangat, mengecek presensi, dan memimpin doa bersama.\n- Kondisi Pijakan Awal: Dalam mengondisikan kesiapan belajar siswa, ${buildMulti(actsAwal)}.\n- Guru melempar pertanyaan pemantik kontekstual mengenai ${topik || "[Topik]"} dalam ruang lingkup ${mapel || "[Mapel]"}.\n- Menyampaikan target capaian pembelajaran hari ini.`,
                    inti1: `${mod.memahami}\n\n${inti1_pmm ? inti1_pmm : "- Guru memandu jalannya orientasi konsep secara runtul dan joyful."}`,
                    inti2: `${mod.mengaplikasi}\n\n${inti2_pmm}`,
                    inti3: `${mod.merefleksi}\n\n${inti3_pmm ? inti3_pmm : "- Guru memfasilitasi konfirmasi materi guna meluruskan miskonsepsi siswa."}`,
                    penutup: `- Guru bersama peserta didik merangkum kesimpulan esensial dari aktivitas ${topik || "[Topik]"}.\n- Kondisi Resolusi Akhir: Saat melakukan evaluasi dan refleksi penutup kelas, ${buildMulti(actsAkhir)}.\n- Berdoa bersama dan menutup kelas dengan salam.`
                };
            },

            generateRekomendasiAsesmen: (topik, metode, indikator, fokusPMM) => {
                const mod = getModelData(metode);
                const infoFokus = fokusPMM === "Semua Fokus" ? "seluruh ragam target perilaku" : "fokus aksi klinis";
                return {
                    awal: `Diagnostik Kognitif awal: Mengukur pemahaman prasyarat siswa tentang ${topik || "[Topik]"}.`,
                    formatif: `Lembar Observasi Sikap: Menilai dinamika perkembangan karakter siswa yang sinkron dengan rubrik PMM ${indikator} (${infoFokus}).`,
                    sumatif: mod.sumatif
                }
            },

            generateInstrumenAsesmen: (topik, mapel, metode, indikator) => {
                const t = topik || "[Topik]";
                const m = mapel || "[Mapel]";
                const mod = getModelData(metode);

                const soalAwal = `PERTANYAAN DIAGNOSTIK:\n1. Tuliskan apa yang kamu pahami tentang materi "${t}" pada pelajaran ${m}?\n2. Berikan contoh nyata relevansi "${t}" dalam kehidupan sehari-hari!`;
                const legend = "Baru Memulai: Pasif, indikator belum terlihat, membutuhkan intervensi konstan.\nBerkembang: Mulai konsisten memunculkan perilaku namun belum stabil.\nCakap: Secara mandiri memunculkan perilaku baku secara ajeg.\nMahir: Proaktif, memberikan dampak positif bagi ritme kerja kelompok.";
                
                let soalSumatif = `TAGIHAN SUMATIF MATERI (${metode}):\n${mod.sumatif}\n\nPETUNJUK KERJA:\nSelesaikan penugasan komprehensif materi "${t}" ini secara bertanggung jawab bersama mitra kelompok Anda berdasarkan rubrik penilaian unjuk kerja terpilih!`;
                if (metode === "Project-Based Learning (PjBL)") soalSumatif = `TUGAS PROYEK MAJU:\nBuatlah purwarupa/karya nyata aplikatif terkait konsep "${t}".\n\nRubrik Penilaian:\n1. Orisinalitas & Desain Ide (20%)\n2. Proses Manufaktur & Gotong Royong (30%)\n3. Fungsionalitas Mekanik Produk (30%)\n4. Presentasi (20%)`;
                else if (metode === "Problem-Based Learning (PBL)") soalSumatif = `STUDI KASUS NYATA:\nLakukan bedah analisis mendalam pada problem rikel terkait "${t}" dan formulasikan draf solusinya!\n\nRubrik Penilaian:\n1. Kedalaman Identifikasi Akar Masalah (30%)\n2. Kelogisan & Relevansi Solusi (40%)\n3. Struktur Argumen Kelompok (30%)`;
                else if (metode === "Inquiry Learning") soalSumatif = `LAPORAN PENYELIDIKAN:\nSusunlah artikel laporan ilmiah terstruktur dari percobaan mandiri materi "${t}".\n\nRubrik Penilaian:\n1. Konstruksi Hipotesis (20%)\n2. Validitas Instrumen Data (30%)\n3. Ketajaman Analisis Kesimpulan (50%)`;

                return { instAwal: soalAwal, formAspek: ASPEK_MURID_MAP[indikator], formLegend: legend, instSumatif: soalSumatif };
            },

            generateTroubleshooting: (topik) => [
                { masalah: `Abstraksi konsep ${topik} sulit dicerna`, penyebab: "Minimnya jembatan media visual konkret.", solusi: "Gunakan visualisasi analogi atau simulator peraga." },
                { masalah: `Siswa menemui jalan buntu saat pengerjaan tugas ${topik}`, penyebab: "Instruksi terlalu makro / defisit literasi awal.", solusi: "Terapkan scaffolding: urai tugas menjadi sub-bagian kecil." },
                { masalah: "Dinamika internal kelompok macet", penyebab: "Sentralisasi peran atau ada anggota yang pasif.", solusi: "Tegaskan pembagian jobdesk spesifik (Notulis, Ketua, Presenter)." }
            ]
        };

        // --- SUB COMPONENTS ---
        const InputGroup = ({ label, name, val, change, placeholder }) => {
            const id = useId();
            return (
                <div className="flex flex-col gap-1.5">
                    <label htmlFor={id} className="text-sm font-semibold text-slate-300 ml-1">{label}</label>
                    <input id={id} type="text" name={name} value={val} onChange={change} placeholder={placeholder} className="w-full p-3 rounded-xl outline-none" />
                </div>
            );
        };

        const AreaGroup = ({ label, name, val, change, rows, placeholder }) => {
            const id = useId();
            return (
                <div className="flex flex-col gap-1.5 w-full">
                    <label htmlFor={id} className="text-sm font-semibold text-slate-300 ml-1">{label}</label>
                    <textarea id={id} name={name} value={val} onChange={change} rows={rows} placeholder={placeholder} className="w-full p-4 rounded-xl outline-none leading-relaxed resize-y"></textarea>
                </div>
            );
        };

        const ButtonPrimary = ({ onClick, children, icon }) => (
            <button onClick={onClick} className="bg-brand-600 hover:bg-brand-500 text-white px-8 py-3.5 rounded-xl font-bold shadow-[0_0_15px_rgba(37,99,235,0.3)] hover:shadow-[0_0_25px_rgba(37,99,235,0.5)] active:scale-95 transition-all flex items-center justify-center gap-2">
                {children} {icon && <i data-lucide={icon} className="w-5 h-5"></i>}
            </button>
        );

        const ButtonSecondary = ({ onClick, children }) => (
            <button onClick={onClick} className="bg-slate-800/50 hover:bg-slate-700/80 text-white border border-slate-600/50 px-8 py-3.5 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                {children}
            </button>
        );

        // --- MAIN APP ---
        function App() {
            const [step, setStep] = useState(1);
            const [isGenerated, setIsGenerated] = useState(false);
            
            // Cascading Cascader States
            const [selectedFase, setSelectedFase] = useState("Fase D (SMP/MTs Grade 7-9)");
            const [selectedMapel, setSelectedMapel] = useState("Ilmu Pengetahuan Alam (IPA)");
            const [selectedElemen, setSelectedElemen] = useState("Pemahaman IPA");

            const [formData, setFormData] = useState({
                guru: "", kepalaSekolah: "", nipKepalaSekolah: "", sekolah: "SMPN 2 Karangtengah", mapel: "Ilmu Pengetahuan Alam (IPA)", kelas: "VIII / Genap", waktu: "3 JP",
                topik: "", lingkupMateri: "", dpl: ["Bernalar Kritis", "Bergotong Royong"],
                kesiapanKonsep: "", kesiapanTeknis: "", kesiapanMental: "", karakteristikMateri: "",
                indikator: "Disiplin Positif", fokusPMM: "Semua Fokus", metode: "Problem-Based Learning (PBL)", kemitraan: "Rekan Sejawat",
                tujuanPembelajaran: "", capaianPembelajaran: "",
                kegiatanAwal: "", kegiatanInti1: "", kegiatanInti2: "", kegiatanInti3: "", kegiatanPenutup: "",
                asesmenAwal: "", asesmenFormatif: "", asesmenSumatif: "", troubleshooting: [],
                instrumenAwal: "", instrumenFormatifAspek: "", instrumenFormatifLegend: "", instrumenSumatif: ""
            });

            // Sinkronisasi Perubahan Cascading Dropdown ke State Form Utama
            const handleFaseChange = (e) => {
                const fase = e.target.value;
                setSelectedFase(fase);
                const mapels = Object.keys(DATABASE_KURIKULUM[fase]);
                setSelectedMapel(mapels[0]);
                const elemens = Object.keys(DATABASE_KURIKULUM[fase][mapels[0]]);
                setSelectedElemen(elemens[0]);
            };

            const handleMapelDropdownChange = (e) => {
                const mapel = e.target.value;
                setSelectedMapel(mapel);
                const elemens = Object.keys(DATABASE_KURIKULUM[selectedFase][mapel]);
                setSelectedElemen(elemens[0]);
            };

            // Smart Engine Reactive Weaver
            useEffect(() => {
                const cp = DATABASE_KURIKULUM[selectedFase]?.[selectedMapel]?.[selectedElemen] || "";
                const lingkupDinamis = SmartEngine.getLingkupMateri(formData.topik, selectedMapel, formData.metode, selectedElemen);
                const kesiapan = SmartEngine.getKesiapan(formData.topik, selectedMapel);
                const experience = SmartEngine.generatePengalamanBelajar(formData.topik, selectedMapel, formData.metode, formData.indikator, formData.fokusPMM);
                const asesmen = SmartEngine.generateRekomendasiAsesmen(formData.topik, formData.metode, formData.indikator, formData.fokusPMM);
                const instrumen = SmartEngine.generateInstrumenAsesmen(formData.topik, selectedMapel, formData.metode, formData.indikator);
                const trouble = SmartEngine.generateTroubleshooting(formData.topik);

                setFormData(prev => ({
                    ...prev,
                    mapel: selectedMapel,
                    capaianPembelajaran: cp,
                    lingkupMateri: lingkupDinamis,
                    karakteristikMateri: `Materi ${formData.topik || '[Topik]'} pada rumpun elemen ${selectedElemen} mapel ${selectedMapel} mengedepankan penalaran kontekstual serta pemecahan problem otentik.`,
                    kesiapanKonsep: kesiapan.konsep, kesiapanTeknis: kesiapan.teknis, kesiapanMental: kesiapan.mental,
                    tujuanPembelajaran: `Melalui sintaks ${formData.metode} pada kriteria elemen ${selectedElemen}, peserta didik mampu menganalisis esensi dasar ${formData.topik || '[Topik]'} serta menuntaskan target penugasan secara berkelompok ${prev.dpl.length > 0 ? 'sambil menumbuhkan karakter ' + prev.dpl.join(', ') : ''}.`,
                    kegiatanAwal: experience.awal, kegiatanInti1: experience.inti1, kegiatanInti2: experience.inti2, kegiatanInti3: experience.inti3, kegiatanPenutup: experience.penutup,
                    asesmenAwal: asesmen.awal, asesmenFormatif: asesmen.formatif, asesmenSumatif: asesmen.sumatif,
                    troubleshooting: trouble,
                    instrumenAwal: instrumen.instAwal,
                    instrumenFormatifAspek: instrumen.formAspek,
                    instrumenFormatifLegend: instrumen.formLegend,
                    instrumenSumatif: instrumen.instSumatif
                }));
            }, [selectedFase, selectedMapel, selectedElemen, formData.topik, formData.metode, formData.indikator, formData.fokusPMM, formData.dpl]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const updateTrouble = (idx, field, val) => {
                const newArr = [...formData.troubleshooting];
                newArr[idx][field] = val;
                setFormData(prev => ({...prev, troubleshooting: newArr}));
            };

            const handleExportJSON = () => {
                const exportData = {
                    appName: "Smart RPP Generator Pro",
                    exportType: "lesson_plan",
                    exportedAt: new Date().toISOString(),
                    school: formData.sekolah || "",
                    teacher: formData.guru || "",
                    principal: formData.kepalaSekolah || "",
                    subject: selectedMapel || formData.mapel || "",
                    grade: formData.kelas || "",
                    phase: selectedFase || "",
                    semester: formData.kelas || "",
                    topic: formData.topik || "",
                    curriculumElement: selectedElemen || "",
                    capaianPembelajaran: DATABASE_KURIKULUM[selectedFase]?.[selectedMapel]?.[selectedElemen] || "",
                    tujuanPembelajaran: formData.tujuanPembelajaran || "",
                    lingkupMateri: formData.lingkupMateri || "",
                    learningReadiness: {
                        konsep: formData.kesiapanKonsep || "",
                        teknis: formData.kesiapanTeknis || "",
                        mental: formData.kesiapanMental || ""
                    },
                    learningActivities: {
                        introduction: formData.kegiatanAwal || "",
                        core: {
                            memahami: formData.kegiatanInti1 || "",
                            mengaplikasi: formData.kegiatanInti2 || "",
                            merefleksi: formData.kegiatanInti3 || ""
                        },
                        closing: formData.kegiatanPenutup || ""
                    },
                    assessmentPlan: {
                        awal: formData.asesmenAwal || "",
                        formatif: formData.asesmenFormatif || "",
                        sumatif: formData.asesmenSumatif || ""
                    },
                    instruments: {
                        awal: formData.instrumenAwal || "",
                        formatifAspek: formData.instrumenFormatifAspek || "",
                        formatifLegend: formData.instrumenFormatifLegend || "",
                        sumatif: formData.instrumenSumatif || ""
                    },
                    pmmIndicator: (formData.indikator || "") + (formData.fokusPMM ? ` (${formData.fokusPMM})` : ""),
                    learningModel: formData.metode || ""
                };

                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const downloadAnchor = document.createElement("a");
                downloadAnchor.href = url;
                const slugify = (str) => (str || "untitled").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
                const dateStr = new Date().toISOString().split("T")[0];
                downloadAnchor.download = `lesson-plan-${slugify(selectedMapel || formData.mapel)}-${slugify(formData.topik)}-${dateStr}.json`;
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                document.body.removeChild(downloadAnchor);
                URL.revokeObjectURL(url);
            };

            const handleExportDraftAsesmen = () => {

                        notes: []

                };

                downloadAnchor.href = url;
                downloadAnchor.download = `assessment-draft-${slugify(selectedMapel || formData.mapel)}-${slugify(formData.topik)}-${dateStr}.json`;

                                    <div className="text-center border-b-[3px] border-double border-black pb-3 mb-5">
                                        <h1 className="text-xl font-bold uppercase tracking-wide">PERENCANAAN PEMBELAJARAN (RPP)</h1>
                                        <h2 className="font-semibold uppercase text-[14px] mt-0.5">{formData.mapel} (PENDEKATAN DEEP LEARNING)</h2>
                                    </div>

                                    <table className="w-full mb-5 border-collapse text-[12px]">
                                        <tbody>
                                            <tr><td className="font-bold w-[120px] py-0.5 align-top">Nama Sekolah</td><td className="w-2 align-top">:</td><td className="align-top pr-4">{formData.sekolah}</td><td className="font-bold w-[120px] py-0.5 align-top">Lingkup Materi</td><td className="w-2 align-top">:</td><td className="align-top">{formData.lingkupMateri}</td></tr>
                                            <tr><td className="font-bold py-0.5 align-top">Mata Pelajaran</td><td className="align-top">:</td><td className="align-top pr-4">{formData.mapel}</td><td className="font-bold py-0.5 align-top">Alokasi Waktu</td><td className="align-top">:</td><td className="align-top">{formData.waktu}</td></tr>
                                            <tr><td className="font-bold py-0.5 align-top">Kelas/Semester</td><td className="align-top">:</td><td className="align-top pr-4">{formData.kelas}</td><td className="font-bold py-0.5 align-top">Guru Pengampu</td><td className="align-top">:</td><td className="align-top">{formData.guru}</td></tr>
                                        </tbody>
                                    </table>

                                    <div className="mb-4">
                                        <h3 className="font-bold bg-slate-100 p-1.5 mb-2 uppercase border border-slate-300 text-[13px]">I. IDENTIFIKASI & MATRIKS KURIKULUM</h3>
                                        <div className="ml-1 pl-1 space-y-2">
                                            <p className="text-justify"><strong>A. Capaian Pembelajaran (BSKAP 2026):</strong> <span className="italic text-gray-700">{formData.capaianPembelajaran}</span></p>
                                            <div>
                                                <p className="font-bold underline mb-0.5">B. Kondisi Kesiapan Lulusan:</p>
                                                <ul className="list-disc ml-5 space-y-0.5">
                                                    <li><strong>Konsep (Mindful):</strong> {formData.kesiapanKonsep}</li>
                                                    <li><strong>Teknis (Psikomotor):</strong> {formData.kesiapanTeknis}</li>
                                                    <li><strong>Mental (Joyful):</strong> {formData.kesiapanMental}</li>
                                                </ul>
                                            </div>
                                            <p className="text-justify"><strong>C. Karakteristik Materi:</strong> {formData.karakteristikMateri}</p>
                                            <p><strong>D. Dimensi Profil Pelajar Pancasila:</strong> {formData.dpl.join(", ")}</p>
                                        </div>
                                    </div>

                                    <div className="mb-4">
                                        <h3 className="font-bold bg-slate-100 p-1.5 mb-2 uppercase border border-slate-300 text-[13px]">II. DESAIN STRATEGIS</h3>
                                        <div className="ml-1 pl-1 space-y-1">
                                            <p className="text-justify"><strong>Tujuan Pembelajaran:</strong> {formData.tujuanPembelajaran}</p>
                                            <p><strong>Indikator Evaluasi PMM:</strong> {formData.indikator} <span className="font-bold">({formData.fokusPMM})</span></p>
                                            <p><strong>Model / Praktik Pedagogis:</strong> {formData.metode}</p>
                                            <p><strong>Kemitraan Komunitas Belajar:</strong> {formData.kemitraan}</p>
                                        </div>
                                    </div>

                                    <div className="mb-4">
                                        <h3 className="font-bold bg-slate-100 p-1.5 mb-2 uppercase border border-slate-300 text-[13px]">III. PENGALAMAN BELAJAR BERKONTEKS</h3>
                                        <div className="mb-2 ml-1"><p className="font-bold underline mb-0.5">1. Skenario Pendahuluan</p><div className="ml-2 pl-1.5 border-l-2 border-slate-200">{formatText(formData.kegiatanAwal)}</div></div>
                                        <div className="mb-2 ml-1">
                                            <p className="font-bold underline mb-0.5">2. Sintaks Inti Model</p>
                                            <table className="w-full border-collapse border border-black mt-1.5 text-[11.5px]">
                                                <thead><tr className="bg-slate-50"><th className="border border-black p-1.5 text-left w-[25%]">Tahapan Deep</th><th className="border border-black p-1.5 text-left">Aktivitas Pembelajaran Kontekstual</th></tr></thead>
                                                <tbody>
                                                    <tr><td className="border border-black p-1.5 align-top font-bold">1. Memahami<br/><span className="text-[10px] font-normal italic">(Berkesadaran)</span></td><td className="border border-black p-1.5 align-top">{formatText(formData.kegiatanInti1)}</td></tr>
                                                    <tr><td className="border border-black p-1.5 align-top font-bold">2. Mengaplikasi<br/><span className="text-[10px] font-normal italic">(Bermakna)</span></td><td className="border border-black p-1.5 align-top">{formatText(formData.kegiatanInti2)}</td></tr>
                                                    <tr><td className="border border-black p-1.5 align-top font-bold">3. Merefleksi<br/><span className="text-[10px] font-normal italic">(Menggembirakan)</span></td><td className="border border-black p-1.5 align-top">{formatText(formData.kegiatanInti3)}</td></tr>
                                                </tbody>
                                            </table>
                                        </div>
                                        <div className="ml-1"><p className="font-bold underline mb-0.5">3. Skenario Penutup</p><div className="ml-2 pl-1.5 border-l-2 border-slate-200">{formatText(formData.kegiatanPenutup)}</div></div>
                                    </div>
                                    
                                    <div className="page-break-inside-avoid">
                                        <h3 className="font-bold bg-slate-100 p-1.5 mb-2 uppercase border border-slate-300 text-[13px]">IV. MATRIKS ASESMEN & TANDA TANGAN</h3>
                                        <div className="grid grid-cols-3 gap-2 mb-4 text-[11.5px]">
                                            <div className="border border-black p-1.5"><p className="font-bold text-center border-b border-black pb-0.5 mb-1">Awal (Diagnostik)</p><p>{formData.asesmenAwal}</p></div>
                                            <div className="border border-black p-1.5"><p className="font-bold text-center border-b border-black pb-0.5 mb-1">Formatif (Sikap)</p><p>{formData.asesmenFormatif}</p></div>
                                            <div className="border border-black p-1.5"><p className="font-bold text-center border-b border-black pb-0.5 mb-1">Sumatif (Kinerja)</p><p>{formData.asesmenSumatif}</p></div>
                                        </div>

                                        <p className="font-bold mb-1 text-[11.5px] underline">POSKO SOLUSI (Panduan Praktis Troubleshooting Kelas)</p>
                                        <table className="w-full border-collapse border border-black text-[11px] mb-6">
                                            <thead><tr className="bg-slate-50"><th className="border border-black p-1 text-left w-[30%]">Anomali Masalah</th><th className="border border-black p-1 text-left w-[35%]">Akar Penyebab</th><th className="border border-black p-1 text-left">Langkah Solusi Klinis</th></tr></thead>
                                            <tbody>
                                                {formData.troubleshooting.map((t, i) => (
                                                    <tr key={i}><td className="border border-black p-1 font-bold">{t.masalah}</td><td className="border border-black p-1">{t.penyebab}</td><td className="border border-black p-1 text-emerald-800">{t.solusi}</td></tr>
                                                ))}
                                            </tbody>
                                        </table>
                                        
                                        <div className="mt-12 flex justify-between text-[12px] font-bold page-break-inside-avoid">
                                            <div className="text-center w-56">
                                                <p>Mengetahui,</p>
                                                <p>Kepala Sekolah</p>
                                                <br/><br/><br/>
                                                <p className="border-b border-black inline-block min-w-[160px] pb-0.5">{formData.kepalaSekolah || "........................................"}</p>
                                                <p className="mt-0.5 font-normal text-[11px]">NIP. {formData.nipKepalaSekolah || "........................"}</p>
                                            </div>
                                            <div className="text-center w-56">
                                                <p>Guru Mata Pelajaran</p>
                                                <br/><br/><br/>
                                                <p className="border-b border-black inline-block min-w-[160px] pb-0.5">{formData.guru || "........................................"}</p>
                                                <p className="mt-0.5 font-normal text-[11px] text-white select-none">.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* PAGE 2: LAMPIRAN INSTRUMEN */}
                                <div className="bg-white text-black p-12 shadow-2xl mx-auto max-w-[210mm] min-h-[297mm] page-break mt-10 text-[13px] leading-[1.6]">
                                    <div className="text-center border-b-[3px] border-double border-black pb-3 mb-6">
                                        <h1 className="text-xl font-bold uppercase tracking-wide">LAMPIRAN INSTRUMEN ASESMEN</h1>
                                    </div>
                                    <div className="space-y-6">
                                        <div>
                                            <div className="font-bold bg-slate-100 p-1.5 mb-2 uppercase border border-slate-300 text-[12px]">1. MATRIKS SOAL DIAGNOSTIK KOGNITIF AWAL</div>
                                            <div className="border border-black p-4 whitespace-pre-line text-[12px] bg-slate-50/50">{formData.instrumenAwal}</div>
                                        </div>
                                        <div>
                                            <div className="font-bold bg-slate-100 p-1.5 mb-1 uppercase border border-slate-300 text-[12px]">2. LEMBAR OBSERVASI FORMATIF SISWA SINKRON RUBRIK PMM</div>
                                            <table className="w-full border-collapse border border-black text-[11.5px] mb-3 mt-2">
                                                <thead>
                                                    <tr className="bg-slate-50"><th className="border border-black p-2 w-[45%] text-left">Aspek Sikap Target Evaluasi</th><th className="border border-black p-2 text-center w-[13.7%]">Baru Memulai</th><th className="border border-black p-2 text-center w-[13.7%]">Berkembang</th><th className="border border-black p-2 text-center w-[13.7%]">Cakap</th><th className="border border-black p-2 text-center w-[13.7%]">Mahir</th></tr>
                                                </thead>
                                                <tbody>
                                                    {formData.instrumenFormatifAspek.split('\n').filter(a => a.trim() !== '').map((aspek, i) => (
                                                        <tr key={i}><td className="border border-black p-2.5">{aspek}</td><td className="border border-black p-2.5"></td><td className="border border-black p-2.5"></td><td className="border border-black p-2.5"></td><td className="border border-black p-2.5"></td></tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                            <div className="border border-black p-3 bg-slate-50 text-[11px] leading-relaxed">
                                                <p className="font-bold mb-1">Keterangan Standar Kriteria:</p>
                                                <div className="whitespace-pre-line">{formData.instrumenFormatifLegend}</div>
                                            </div>
                                        </div>
                                        <div className="page-break-inside-avoid">
                                            <div className="font-bold bg-slate-100 p-1.5 mb-2 uppercase border border-slate-300 text-[12px]">3. STRUKTUR TAGIHAN SUMATIF AKHIR KINERJA</div>
                                            <div className="border border-black p-4 whitespace-pre-line text-[12px] bg-slate-50/50">{formData.instrumenSumatif}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* FLOATING AUTHOR SIGNATURE (senada tema Premium UI & no-print) */}
                    <div className="fixed bottom-6 right-6 z-50 no-print group">
                        <div className="bg-[#0b111d]/80 backdrop-blur-xl border border-white/10 rounded-2xl p-3 flex flex-col gap-2.5 shadow-[0_10px_40px_rgba(0,0,0,0.8)] hover:border-white/20 hover:-translate-y-1 transition-all duration-300">
                            <div className="text-[10px] uppercase tracking-widest text-slate-500 font-bold px-1 group-hover:text-brand-400 transition-colors">Crafted By</div>
                            <div className="flex items-center gap-3 bg-white/5 px-3 py-2.5 rounded-xl border border-white/5 cursor-default hover:bg-white/10 transition-colors" title="Minecraft Nametag">
                                <i data-lucide="gamepad-2" className="w-4 h-4 text-emerald-400 drop-shadow-[0_0_8px_rgba(52,211,153,0.8)]"></i>
                                <span className="text-xs font-bold text-slate-200 tracking-wide">nazure_02</span>
                            </div>
                            <a href="https://instagram.com/purwaumbara" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 bg-white/5 px-3 py-2.5 rounded-xl border border-white/5 hover:bg-white/10 hover:border-pink-500/50 transition-colors" title="Instagram">
                                <i data-lucide="instagram" className="w-4 h-4 text-pink-400 drop-shadow-[0_0_8px_rgba(244,114,182,0.8)]"></i>
                                <span className="text-xs font-bold text-slate-200 tracking-wide">@purwaumbara</span>
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
