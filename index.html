<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPP Generator (Pro Deep Learning + PMM)</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 900: '#14532d' }
                    },
                    animation: { 'pulse-short': 'pulse 0.5s cubic-bezier(0.4, 0, 0.6, 1) 2' }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.98); border: 1px solid rgba(255, 255, 255, 0.05); }
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; color: black; }
            .glass-panel { box-shadow: none; border: none; }
            .page-break { page-break-before: always; }
            table { page-break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ENGINE DATA PMM ---
        const INDIKATOR_PMM = {
            "Keteraturan Suasana Kelas": {
                awal: "**Guru memanggil murid dengan namanya, menyapa dengan hangat, dan mengajak menyepakati aturan kelas secara kolaboratif.**",
                inti: "**Guru mengelompokkan murid dengan tujuan yang jelas dan memastikan rotasi peran yang adil di setiap kelompok.**",
                penutup: "**Guru mengingatkan kembali kesepakatan kelas secara lembut dan mengevaluasi pelaksanaannya.**",
                formatif: "Observasi Ceklis: Kepatuhan murid terhadap kesepakatan kelas dan keaktifan kelompok."
            },
            "Penerapan Disiplin Positif": {
                awal: "**Guru mengajak murid merefleksikan aturan dan menyepakati target perilaku positif hari ini.**",
                inti: "**Guru membantu murid menyadari konsekuensi pelanggaran (restitusi) tanpa hukuman fisik/psikis.**",
                penutup: "**Guru memberikan pengakuan spesifik dan pujian tulus pada perilaku positif murid.**",
                formatif: "Catatan Anekdot: Kemampuan pengendalian diri dan respon terhadap tantangan."
            },
            "Umpan Balik Konstruktif": {
                awal: "**Guru menjelaskan kriteria keberhasilan dengan jelas di awal agar murid memahami ekspektasi tugas.**",
                inti: "**Guru memberikan masukan spesifik yang fokus pada progres/usaha murid, bukan sekadar nilai akhir.**",
                penutup: "**Guru berdiskusi dengan murid untuk menentukan rencana perbaikan tugas selanjutnya.**",
                formatif: "Peer-Review & Rubrik: Umpan balik antar teman berdasarkan kriteria objektif."
            },
            "Perhatian dan Kepedulian": {
                awal: "**Guru melakukan check-in perasaan (roda emosi) dan mendengarkan keluh kesah murid dengan empati.**",
                inti: "**Guru memberikan bantuan (diferensiasi) sesuai dengan tingkat kesulitan masing-masing murid.**",
                penutup: "**Guru merayakan keberagaman karakteristik, latar belakang, serta gaya belajar di kelas.**",
                formatif: "Observasi Empati: Interaksi sosial dan kepedulian antar murid."
            },
            "Ekspektasi pada Peserta Didik": {
                awal: "**Guru menyampaikan harapan positif dan meyakinkan bahwa setiap murid mampu menguasai tantangan.**",
                inti: "**Guru memberikan tantangan tambahan bermakna bagi murid yang cepat selesai.**",
                penutup: "**Guru memuji kemajuan sekecil apa pun yang dicapai untuk membangun motivasi intrinsik.**",
                formatif: "Self-Assessment: Murid menilai usaha dan pencapaian target personalnya."
            },
            "Aktivitas Interaktif": {
                awal: "**Guru memberikan pertanyaan pemantik terbuka (HOTS) yang memicu diskusi awal.**",
                inti: "**Guru membagi peran dalam kelompok dan memancing murid yang pasif agar ikut bicara.**",
                penutup: "**Guru mengajak kelompok untuk saling memberikan tanggapan silang.**",
                formatif: "Lembar Observasi Diskusi: Kualitas argumen dan pemerataan keterlibatan."
            },
            "Instruksi yang Adaptif": {
                awal: "**Guru melakukan asesmen diagnostik singkat (acung jempol) untuk mengetahui kesiapan murid.**",
                inti: "**Guru segera mengubah strategi penjelasan saat melihat murid tampak kebingungan.**",
                penutup: "**Guru melakukan pengecekan pemahaman berkala memastikan tidak ada yang tertinggal.**",
                formatif: "Kuis Formatif Cepat (Lisan): Cek pemahaman di tengah kegiatan."
            },
            "Instruksi Pembelajaran": {
                awal: "**Guru menjelaskan tujuan dan langkah pembelajaran selangkah demi selangkah.**",
                inti: "**Guru menggunakan analogi sehari-hari dan alat peraga untuk memperjelas konsep abstrak.**",
                penutup: "**Guru merangkum dan mengaitkan kembali materi dengan pengalaman nyata.**",
                formatif: "Cek Pemahaman Prosedural: Meminta murid mengulangi instruksi dengan bahasa sendiri."
            }
        };

        const MODEL_PEMBELAJARAN = {
            "PjBL": {
                memahami: "Aktivitas: Murid mengamati masalah kontekstual terkait topik dan mendiskusikan rencana proyek penyelesaiannya.",
                mengaplikasi: "Aktivitas: Murid secara kolaboratif merancang jadwal, membagi tugas, dan mulai membuat prototipe/karya nyata.",
                merefleksi: "Aktivitas: Murid mempresentasikan hasil karyanya, melakukan uji coba, dan menerima masukan dari kelompok lain.",
                sumatif: "Penilaian Produk/Proyek (Kriteria: Orisinalitas, Fungsi, Estetika)."
            },
            "PBL": {
                memahami: "Aktivitas: Murid disajikan sebuah anomali atau kasus nyata terkait topik dan merumuskan pertanyaan/masalah utamanya.",
                mengaplikasi: "Aktivitas: Murid melakukan investigasi, mengumpulkan data, dan mendiskusikan berbagai alternatif solusi.",
                merefleksi: "Aktivitas: Murid menyajikan solusi akhir yang disepakati dan mengevaluasi efektivitas solusi tersebut bersama guru.",
                sumatif: "Penilaian Unjuk Kerja & Laporan Analisis Pemecahan Masalah."
            },
            "Inkuiri": {
                memahami: "Aktivitas: Guru mendemonstrasikan sebuah fenomena terkait topik. Murid merumuskan hipotesis sementara.",
                mengaplikasi: "Aktivitas: Murid merancang eksperimen sederhana, mengumpulkan bukti, dan mencatat data hasil pengamatan.",
                merefleksi: "Aktivitas: Murid menganalisis data untuk membuktikan hipotesis dan mengomunikasikan prinsip dasar yang ditemukan.",
                sumatif: "Laporan Praktikum/Eksperimen Sistematis."
            },
            "Discovery": {
                memahami: "Aktivitas: Murid mengeksplorasi berbagai contoh dan bukan-contoh dari topik yang diberikan oleh guru.",
                mengaplikasi: "Aktivitas: Murid membandingkan informasi, mengidentifikasi pola, dan membuktikan konsep melalui observasi terarah.",
                merefleksi: "Aktivitas: Murid melakukan generalisasi (menarik kesimpulan umum) tentang sifat dan aturan dari topik tersebut.",
                sumatif: "Tes Tertulis / Uraian Pemahaman Konsep."
            }
        };

        // --- SMART ENGINE LOGIC ---
        const SmartEngine = {
            getKesiapan: (topik) => ({
                konsep: `Sebagian besar siswa sudah pernah mendengar istilah "${topik}", namun pemahaman mereka masih bersifat umum dan belum menyentuh prinsip ilmiah/mendalam.`,
                teknis: `Siswa membutuhkan panduan dalam penggunaan alat spesifik atau kerangka berpikir untuk materi ${topik}.`,
                mental: `Membangun rasa percaya diri siswa untuk bereksperimen dengan ${topik} tanpa takut salah, serta menanamkan tanggung jawab.`
            }),

            getFormatifData: (indikator) => {
                const data = {
                    "Keteraturan Suasana Kelas": {
                        aspek: "1. Kepatuhan terhadap kesepakatan dan aturan kelas\n2. Keterlibatan aktif dalam pembagian peran kelompok",
                        legend: "Baru Memulai: Pasif dan sering mengabaikan aturan kelas.\nBerkembang: Terlibat dalam kelompok namun masih perlu diingatkan soal aturan.\nCakap: Aktif menjalankan peran dan mematuhi aturan secara mandiri.\nMahir: Proaktif memimpin kelompok dan mengajak teman mematuhi aturan."
                    },
                    "Penerapan Disiplin Positif": {
                        aspek: "1. Pengendalian emosi saat menghadapi kesulitan tugas\n2. Tanggung jawab terhadap konsekuensi tindakan",
                        legend: "Baru Memulai: Mudah menyerah/marah saat sulit, menghindari tanggung jawab.\nBerkembang: Mampu mengendalikan diri dengan bantuan atau teguran guru.\nCakap: Menerima konsekuensi dan mencari solusi secara mandiri.\nMahir: Menunjukkan ketahanan (resiliensi) tinggi dan memotivasi teman."
                    },
                    "Umpan Balik Konstruktif": {
                        aspek: "1. Keterbukaan menerima masukan dari teman/guru\n2. Kualitas memberikan umpan balik ke teman (Peer-review)",
                        legend: "Baru Memulai: Menolak masukan atau memberi kritik tanpa solusi.\nBerkembang: Menerima masukan tapi belum diterapkan pada karyanya.\nCakap: Memperbaiki karya berdasarkan masukan dan memberi saran baik ke teman.\nMahir: Meminta masukan secara proaktif dan memberi saran yang detail/membangun."
                    },
                    "Aktivitas Interaktif": {
                        aspek: "1. Keberanian menyampaikan pendapat/ide gagasan\n2. Kolaborasi dan merespon pendapat teman",
                        legend: "Baru Memulai: Diam dan tidak merespon saat diajak berdiskusi.\nBerkembang: Merespon jika ditanya, namun belum berani memulai opini.\nCakap: Berani berpendapat dan menghargai opini teman.\nMahir: Menjadi fasilitator diskusi, menengahi perbedaan pendapat."
                    }
                };
                return data[indikator] || {
                    aspek: "1. Pemahaman terhadap instruksi pembelajaran\n2. Keterlibatan aktif dalam menyelesaikan tugas",
                    legend: "Baru Memulai: Belum paham instruksi dan tidak mengerjakan tugas.\nBerkembang: Paham sebagian instruksi, butuh pendampingan konstan.\nCakap: Mampu mengerjakan tugas sesuai instruksi secara mandiri.\nMahir: Mengerjakan tugas dengan hasil melebihi ekspektasi dan cepat."
                };
            },

            generatePengalamanBelajar: (topik, metode, indikator) => {
                const topicText = topik || "[Topik]";
                const ind = INDIKATOR_PMM[indikator || "Keteraturan Suasana Kelas"];
                const mod = MODEL_PEMBELAJARAN[metode || "PBL"];

                return {
                    awal: `- Guru mengucapkan salam, mengecek kehadiran, dan memimpin doa.\n- ${ind.awal}\n- Guru mengajukan pertanyaan apersepsi terkait ${topicText}.\n- Guru menyampaikan tujuan pembelajaran.`,
                    inti1: `${mod.memahami}\n\n- ${indikator === "Aktivitas Interaktif" || indikator === "Instruksi Pembelajaran" ? ind.inti : "Guru mendampingi proses pemahaman awal murid."}`,
                    inti2: `${mod.mengaplikasi}\n\n- ${indikator !== "Aktivitas Interaktif" && indikator !== "Instruksi Pembelajaran" ? ind.inti : "Guru memantau jalannya diskusi/praktik secara merata."}`,
                    inti3: `${mod.merefleksi}\n\n- Guru memfasilitasi diskusi kelas untuk meluruskan miskonsepsi terkait ${topicText}.`,
                    penutup: `- Guru bersama murid menyimpulkan pembelajaran tentang ${topicText}.\n- ${ind.penutup}\n- Guru menutup pelajaran dengan doa dan salam.`
                };
            },

            generateRekomendasiAsesmen: (topik, metode, indikator) => {
                const mod = MODEL_PEMBELAJARAN[metode || "PBL"];
                const ind = INDIKATOR_PMM[indikator || "Keteraturan Suasana Kelas"];
                return {
                    awal: `Kuis lisan pemantik untuk memetakan pemahaman dasar tentang ${topik}.`,
                    formatif: `${ind.formatif}`,
                    sumatif: mod.sumatif
                }
            },

            generateInstrumenAsesmen: (topik, metode, indikator) => {
                const topicText = topik || "[Topik]";
                const soalAwal = `PERTANYAAN DIAGNOSTIK LISAN:\n1. Apa yang kamu ketahui tentang "${topicText}"?\n2. Mengapa materi "${topicText}" ini penting untuk kita pelajari?`;
                const formatifData = SmartEngine.getFormatifData(indikator);
                
                let soalSumatif = "";
                if (metode === "PjBL") soalSumatif = `TUGAS PROYEK:\nBuatlah sebuah produk/karya nyata yang berkaitan dengan "${topicText}".\n\nKriteria Penilaian (Bobot):\n1. Perencanaan Ide (20%)\n2. Proses Pembuatan & Kolaborasi (30%)\n3. Fungsionalitas & Estetika Produk (30%)\n4. Presentasi (20%)`;
                else if (metode === "PBL") soalSumatif = `STUDI KASUS:\nAnalisislah sebuah permasalahan nyata terkait "${topicText}" dan formulasikan solusinya!\n\nKriteria Penilaian:\n1. Kedalaman Analisis Masalah (30%)\n2. Kelogisan Solusi (40%)\n3. Kerjasama Kelompok (30%)`;
                else if (metode === "Inkuiri") soalSumatif = `LAPORAN EKSPERIMEN:\nSusunlah laporan dari percobaan tentang "${topicText}".\n\nKriteria Penilaian:\n1. Rumusan Hipotesis (20%)\n2. Keakuratan Data (30%)\n3. Analisis & Kesimpulan (50%)`;
                else soalSumatif = `SOAL TES URAIAN:\n1. Jelaskan konsep dasar dari "${topicText}"!\n2. Berikan contoh nyata penerapan "${topicText}" dalam keseharian!\n3. Analisislah dampak dari fenomena "${topicText}" tersebut!`;

                return { instAwal: soalAwal, formAspek: formatifData.aspek, formLegend: formatifData.legend, instSumatif: soalSumatif };
            },

            generateTroubleshooting: (topik) => [
                { masalah: `Pemahaman konsep ${topik} masih abstrak`, penyebab: "Kurangnya visualisasi konkret.", solusi: "Gunakan alat peraga atau simulasi digital." },
                { masalah: `Kegagalan dalam tugas/produk ${topik}`, penyebab: "Ketidaktepatan prosedur/pemahaman.", solusi: "Review kembali langkah kerja (LKPD) secara perlahan." },
                { masalah: "Diskusi kelompok tidak berjalan", penyebab: "Dominasi satu siswa atau pasif.", solusi: "Guru membagi peran spesifik (Notulis, Presenter, dll)." }
            ]
        };

        // --- MAIN APP ---
        function App() {
            const [darkMode, setDarkMode] = useState(false);
            const [step, setStep] = useState(1);
            const [isGenerated, setIsGenerated] = useState(false);
            
            const [formData, setFormData] = useState({
                // Tahap 1
                guru: "", sekolah: "SMPN 2 Karangtengah", mapel: "", kelas: "VIII / Genap", waktu: "3 JP",
                topik: "", lingkupMateri: "", dpl: ["Bernalar Kritis", "Bergotong Royong"],
                kesiapanKonsep: "", kesiapanTeknis: "", kesiapanMental: "", karakteristikMateri: "",
                
                // Tahap 2
                indikator: "Penerapan Disiplin Positif", metode: "PBL", kemitraan: "Rekan Sejawat",
                tujuanPembelajaran: "",
                
                // Tahap 3
                kegiatanAwal: "", kegiatanInti1: "", kegiatanInti2: "", kegiatanInti3: "", kegiatanPenutup: "",
                
                // Tahap 4
                asesmenAwal: "", asesmenFormatif: "", asesmenSumatif: "", troubleshooting: [],
                
                // Tahap 5
                instrumenAwal: "", instrumenFormatifAspek: "", instrumenFormatifLegend: "", instrumenSumatif: ""
            });

            // Chain Effect: Memperbarui semua isian ketika TOPIK, METODE, atau INDIKATOR diubah
            useEffect(() => {
                if (formData.topik && formData.topik.length > 2) {
                    const kesiapan = SmartEngine.getKesiapan(formData.topik);
                    const experience = SmartEngine.generatePengalamanBelajar(formData.topik, formData.metode, formData.indikator);
                    const asesmen = SmartEngine.generateRekomendasiAsesmen(formData.topik, formData.metode, formData.indikator);
                    const instrumen = SmartEngine.generateInstrumenAsesmen(formData.topik, formData.metode, formData.indikator);
                    const trouble = SmartEngine.generateTroubleshooting(formData.topik);
                    
                    setFormData(prev => ({
                        ...prev,
                        lingkupMateri: `Eksplorasi ${formData.topik}`,
                        karakteristikMateri: `Materi ${formData.topik} bersifat kontekstual dan membutuhkan pembuktian/analisis langsung.`,
                        kesiapanKonsep: kesiapan.konsep, kesiapanTeknis: kesiapan.teknis, kesiapanMental: kesiapan.mental,
                        tujuanPembelajaran: `Peserta didik mampu menganalisis konsep ${formData.topik} dan menyelesaikan masalah terkait dengan tepat ${prev.dpl.length > 0 ? 'serta menunjukkan sikap ' + prev.dpl.join(', ') : ''}.`,
                        
                        kegiatanAwal: experience.awal, kegiatanInti1: experience.inti1, kegiatanInti2: experience.inti2, kegiatanInti3: experience.inti3, kegiatanPenutup: experience.penutup,
                        asesmenAwal: asesmen.awal, asesmenFormatif: asesmen.formatif, asesmenSumatif: asesmen.sumatif,
                        troubleshooting: trouble,

                        instrumenAwal: instrumen.instAwal,
                        instrumenFormatifAspek: instrumen.formAspek,
                        instrumenFormatifLegend: instrumen.formLegend,
                        instrumenSumatif: instrumen.instSumatif
                    }));
                }
            }, [formData.topik, formData.metode, formData.indikator, formData.dpl]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const updateTrouble = (idx, field, val) => {
                const newArr = [...formData.troubleshooting];
                newArr[idx][field] = val;
                setFormData(prev => ({...prev, troubleshooting: newArr}));
            };

            const toggleDarkMode = () => setDarkMode(!darkMode);

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => { lucide.createIcons(); });

            // Formatter untuk mengubah **teks** menjadi cetak tebal
            const formatText = (text) => {
                if (!text) return null;
                return text.split('\n').map((line, i) => (
                    <span key={i} className="block mb-1 text-justify">
                        {line.split(/(\*\*.*?\*\*)/).map((part, j) => {
                            if (part.startsWith('**') && part.endsWith('**')) {
                                return <strong key={j} className="text-black dark:text-white font-bold">{part.slice(2, -2)}</strong>;
                            }
                            return part;
                        })}
                    </span>
                ));
            };

            return (
                <div className="pb-20 font-sans">
                    <header className="fixed top-0 w-full z-50 glass-panel shadow-sm no-print">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-brand-600 p-2 rounded-lg text-white">
                                    <svg data-lucide="book-open" width="24" height="24" stroke="currentColor" strokeWidth="2"></svg>
                                </div>
                                <div>
                                    <h1 className="font-bold text-xl text-slate-800 dark:text-white">Smart RPP Generator</h1>
                                    <p className="text-xs text-slate-500">Pro Version: Deep Learning & PMM Integrated</p>
                                </div>
                            </div>
                            <button onClick={toggleDarkMode} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
                                {darkMode ? '☀️' : '🌙'}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 mt-28">
                        <div className={`transition-all duration-500 ${isGenerated ? 'hidden' : 'block'}`}>
                            
                            {/* STEPPER */}
                            <div className="flex gap-2 mb-8 no-print overflow-x-auto pb-2 scrollbar-hide">
                                {['Identifikasi', 'Desain', 'Pengalaman Belajar', 'Asesmen & Solusi', 'Instrumen'].map((label, idx) => (
                                    <button key={idx} onClick={() => setStep(idx + 1)}
                                        className={`px-4 py-2 rounded-full text-sm font-bold transition-all whitespace-nowrap ${step === idx + 1 ? 'bg-brand-600 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'}`}>
                                        Tahap {idx + 1}: {label}
                                    </button>
                                ))}
                            </div>

                            {/* TAHAP 1: IDENTIFIKASI & KARAKTERISTIK */}
                            {step === 1 && (
                                <div className="glass-panel p-8 rounded-2xl shadow-xl space-y-6">
                                    <div className="border-b pb-6 border-slate-200 dark:border-slate-700">
                                        <label className="block text-lg font-bold text-brand-700 mb-2">1. Topik Utama (Ketik di sini)</label>
                                        <input type="text" name="topik" value={formData.topik} onChange={handleInputChange} placeholder="Misal: Dinamika Litosfer & Vulkanisme" className="w-full p-4 rounded-xl border-2 border-brand-200 focus:border-brand-500 outline-none font-bold text-lg dark:bg-slate-800 dark:text-white" />
                                        <p className="text-xs text-slate-500 mt-2">💡 Topik ini akan menjadi jangkar untuk Kesiapan Murid, Tujuan, Skenario, dan Asesmen.</p>
                                    </div>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        <InputGroup label="Nama Guru" name="guru" val={formData.guru} change={handleInputChange} />
                                        <InputGroup label="Mata Pelajaran" name="mapel" val={formData.mapel} change={handleInputChange} />
                                        <InputGroup label="Sekolah" name="sekolah" val={formData.sekolah} change={handleInputChange} />
                                        <InputGroup label="Kelas / Semester" name="kelas" val={formData.kelas} change={handleInputChange} />
                                        <InputGroup label="Alokasi Waktu" name="waktu" val={formData.waktu} change={handleInputChange} />
                                        <InputGroup label="Lingkup Materi" name="lingkupMateri" val={formData.lingkupMateri} change={handleInputChange} />
                                    </div>
                                    
                                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 space-y-4">
                                        <h3 className="font-bold text-brand-700">Kesiapan Murid & Karakteristik</h3>
                                        <AreaGroup label="Kesiapan Konsep (Mindful)" name="kesiapanKonsep" val={formData.kesiapanKonsep} change={handleInputChange} rows={2} />
                                        <AreaGroup label="Kesiapan Teknis (Psikomotor)" name="kesiapanTeknis" val={formData.kesiapanTeknis} change={handleInputChange} rows={2} />
                                        <AreaGroup label="Kesiapan Mental (Joyful)" name="kesiapanMental" val={formData.kesiapanMental} change={handleInputChange} rows={2} />
                                        <AreaGroup label="Karakteristik Materi" name="karakteristikMateri" val={formData.karakteristikMateri} change={handleInputChange} rows={2} />
                                    </div>

                                    <div className="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200">
                                        <label className="block text-sm font-bold mb-2">Dimensi Profil Lulusan (DPL)</label>
                                        <div className="flex flex-wrap gap-2">
                                            {["Beriman & Bertakwa", "Berkebinekaan Global", "Bergotong Royong", "Mandiri", "Bernalar Kritis", "Kreatif", "Kesehatan"].map((d) => (
                                                <button key={d} onClick={() => setFormData(p => ({...p, dpl: p.dpl.includes(d) ? p.dpl.filter(i => i!==d) : [...p.dpl, d]}))} className={`px-3 py-1 text-xs rounded-full border ${formData.dpl.includes(d) ? 'bg-brand-600 text-white' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}>
                                                    {formData.dpl.includes(d) ? '✓ ' : '+ '} {d}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="flex justify-end mt-4"><ButtonPrimary onClick={() => setStep(2)}>Lanjut: Desain ➡️</ButtonPrimary></div>
                                </div>
                            )}

                            {/* TAHAP 2: DESAIN PEMBELAJARAN */}
                            {step === 2 && (
                                <div className="glass-panel p-8 rounded-2xl shadow-xl space-y-6">
                                    <div className="p-5 bg-brand-50 rounded-xl dark:bg-brand-900/20 border border-brand-200">
                                        <label className="block text-lg font-bold text-brand-800 dark:text-brand-300 mb-2">Pilih Indikator Observasi PMM</label>
                                        <select name="indikator" value={formData.indikator} onChange={handleInputChange} className="w-full p-3 rounded-lg border border-brand-300 outline-none font-semibold dark:bg-slate-800 dark:text-white">
                                            {Object.keys(INDIKATOR_PMM).map(ind => <option key={ind} value={ind}>{ind}</option>)}
                                        </select>
                                    </div>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold mb-1">Model Pembelajaran</label>
                                            <select name="metode" value={formData.metode} onChange={handleInputChange} className="w-full p-2.5 rounded-lg border border-slate-300 dark:bg-slate-800">
                                                {Object.keys(MODEL_PEMBELAJARAN).map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                        <InputGroup label="Kemitraan Pembelajaran" name="kemitraan" val={formData.kemitraan} change={handleInputChange} />
                                    </div>
                                    
                                    <AreaGroup label="Tujuan Pembelajaran" name="tujuanPembelajaran" val={formData.tujuanPembelajaran} change={handleInputChange} rows={3} />
                                    
                                    <div className="flex justify-between mt-4"><ButtonSecondary onClick={() => setStep(1)}>⬅️ Kembali</ButtonSecondary><ButtonPrimary onClick={() => setStep(3)}>Lanjut: Pengalaman Belajar ➡️</ButtonPrimary></div>
                                </div>
                            )}

                            {/* TAHAP 3: PENGALAMAN BELAJAR */}
                            {step === 3 && (
                                <div className="glass-panel p-8 rounded-2xl shadow-xl space-y-5">
                                    <div className="bg-yellow-50 p-3 rounded text-sm text-yellow-800 border border-yellow-200">💡 Teks dengan tanda bintang ganda (<code>**teks**</code>) akan tercetak <strong>Tebal</strong> di PDF sebagai penanda aksi fokus observasi PMM.</div>
                                    
                                    <AreaGroup label="1. Pendahuluan (Berkesadaran, Menggembirakan)" name="kegiatanAwal" val={formData.kegiatanAwal} change={handleInputChange} rows={5} />
                                    
                                    <div className="p-4 border-2 border-slate-200 rounded-xl space-y-4 dark:border-slate-700">
                                        <h3 className="font-bold text-lg text-brand-700">2. Kegiatan Inti ({formData.metode})</h3>
                                        <AreaGroup label="Tahap 1: Memahami (Berkesadaran)" name="kegiatanInti1" val={formData.kegiatanInti1} change={handleInputChange} rows={4} />
                                        <AreaGroup label="Tahap 2: Mengaplikasi (Bermakna)" name="kegiatanInti2" val={formData.kegiatanInti2} change={handleInputChange} rows={4} />
                                        <AreaGroup label="Tahap 3: Merefleksi (Menggembirakan)" name="kegiatanInti3" val={formData.kegiatanInti3} change={handleInputChange} rows={4} />
                                    </div>
                                    
                                    <AreaGroup label="3. Penutup (Berkesadaran, Bermakna)" name="kegiatanPenutup" val={formData.kegiatanPenutup} change={handleInputChange} rows={5} />
                                    
                                    <div className="flex justify-between mt-6"><ButtonSecondary onClick={() => setStep(2)}>⬅️ Kembali</ButtonSecondary><ButtonPrimary onClick={() => setStep(4)}>Lanjut: Asesmen ➡️</ButtonPrimary></div>
                                </div>
                            )}

                            {/* TAHAP 4: ASESMEN & SOLUSI */}
                            {step === 4 && (
                                <div className="glass-panel p-8 rounded-2xl shadow-xl space-y-6">
                                    <h2 className="text-xl font-bold text-brand-700">Rencana Asesmen</h2>
                                    <div className="grid md:grid-cols-3 gap-4">
                                        <AreaGroup label="Awal (Diagnostik)" name="asesmenAwal" val={formData.asesmenAwal} change={handleInputChange} rows={4} />
                                        <AreaGroup label="Formatif (Proses)" name="asesmenFormatif" val={formData.asesmenFormatif} change={handleInputChange} rows={4} />
                                        <AreaGroup label="Sumatif (Akhir)" name="asesmenSumatif" val={formData.asesmenSumatif} change={handleInputChange} rows={4} />
                                    </div>

                                    <div className="mt-8 border-t pt-6 border-slate-200">
                                        <h2 className="text-xl font-bold text-red-600 mb-2">Posko Solusi (Troubleshooting)</h2>
                                        <p className="text-xs text-slate-500 mb-4">Tabel antisipasi kendala saat siswa praktik/diskusi.</p>
                                        {formData.troubleshooting.map((item, idx) => (
                                            <div key={idx} className="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3 bg-red-50 p-3 rounded border border-red-100">
                                                <input type="text" value={item.masalah} onChange={(e) => updateTrouble(idx, 'masalah', e.target.value)} className="p-2 text-xs border rounded w-full font-bold text-red-700 outline-none focus:ring-1 focus:ring-red-400" placeholder="Masalah" />
                                                <input type="text" value={item.penyebab} onChange={(e) => updateTrouble(idx, 'penyebab', e.target.value)} className="p-2 text-xs border rounded w-full outline-none focus:ring-1 focus:ring-red-400" placeholder="Penyebab" />
                                                <input type="text" value={item.solusi} onChange={(e) => updateTrouble(idx, 'solusi', e.target.value)} className="p-2 text-xs border rounded w-full text-green-700 font-semibold outline-none focus:ring-1 focus:ring-red-400" placeholder="Solusi" />
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex justify-between mt-6"><ButtonSecondary onClick={() => setStep(3)}>⬅️ Kembali</ButtonSecondary><ButtonPrimary onClick={() => setStep(5)}>Lanjut: Instrumen ➡️</ButtonPrimary></div>
                                </div>
                            )}

                            {/* TAHAP 5: PEMBUATAN INSTRUMEN */}
                            {step === 5 && (
                                <div className="glass-panel p-8 rounded-2xl shadow-xl space-y-6">
                                    <h2 className="text-2xl font-bold text-indigo-700">📝 Instrumen Asesmen & Rubrik Tabel</h2>

                                    <div className="space-y-6">
                                        <div className="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-200">
                                            <AreaGroup label="1. Instrumen Asesmen Awal (Diagnostik)" name="instrumenAwal" val={formData.instrumenAwal} change={handleInputChange} rows={4} />
                                        </div>
                                        
                                        <div className="p-4 bg-orange-50 dark:bg-orange-900/20 rounded-xl border border-orange-200">
                                            <h3 className="font-bold text-orange-800 mb-3">2. Tabel Formatif (Fokus: {formData.indikator})</h3>
                                            <div className="grid md:grid-cols-2 gap-4">
                                                <AreaGroup label="Daftar Aspek yang Diamati (Baris Tabel)" name="instrumenFormatifAspek" val={formData.instrumenFormatifAspek} change={handleInputChange} rows={6} />
                                                <AreaGroup label="Keterangan / Legend" name="instrumenFormatifLegend" val={formData.instrumenFormatifLegend} change={handleInputChange} rows={6} />
                                            </div>
                                        </div>

                                        <div className="p-4 bg-purple-50 dark:bg-purple-900/20 rounded-xl border border-purple-200">
                                            <AreaGroup label={`3. Instrumen Sumatif (${formData.metode})`} name="instrumenSumatif" val={formData.instrumenSumatif} change={handleInputChange} rows={5} />
                                        </div>
                                    </div>

                                    <div className="flex justify-between mt-8"><ButtonSecondary onClick={() => setStep(4)}>⬅️ Kembali</ButtonSecondary><ButtonPrimary onClick={() => setIsGenerated(true)}>🚀 Generate PDF Dokumen</ButtonPrimary></div>
                                </div>
                            )}
                        </div>

                        {/* OUTPUT PREVIEW SECTION */}
                        {isGenerated && (
                            <div className="pb-20 animate-slide-up">
                                <div className="flex justify-between items-center mb-6 no-print">
                                    <h2 className="text-3xl font-bold text-slate-800 dark:text-white">Dokumen RPP Final</h2>
                                    <div className="flex gap-3">
                                        <button onClick={() => window.print()} className="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-slate-700 shadow">🖨️ Cetak / Simpan PDF</button>
                                        <button onClick={() => setIsGenerated(false)} className="bg-white border text-slate-700 px-6 py-2 rounded-lg font-bold hover:bg-slate-50 shadow">✏️ Edit RPP</button>
                                    </div>
                                </div>

                                {/* A4 Document 1 - RPP */}
                                <div className="bg-white text-black p-10 shadow-2xl mx-auto max-w-[210mm] min-h-[297mm] text-sm leading-relaxed">
                                    {/* HEADER */}
                                    <div className="text-center border-b-2 border-black pb-4 mb-6">
                                        <h1 className="text-xl font-bold uppercase">PERENCANAAN PEMBELAJARAN (RPP)</h1>
                                        <h2 className="font-semibold uppercase text-base">IPA (DEEP LEARNING)</h2>
                                    </div>

                                    <table className="w-full mb-6 border-collapse">
                                        <tbody>
                                            <tr><td className="font-bold w-32 py-1">Nama Sekolah</td><td>: {formData.sekolah}</td><td className="font-bold w-32">Lingkup Materi</td><td>: {formData.lingkupMateri}</td></tr>
                                            <tr><td className="font-bold py-1">Mata Pelajaran</td><td>: {formData.mapel}</td><td className="font-bold">Alokasi Waktu</td><td>: {formData.waktu}</td></tr>
                                            <tr><td className="font-bold py-1">Kelas/Semester</td><td>: {formData.kelas}</td><td className="font-bold">Guru Pengampu</td><td>: {formData.guru}</td></tr>
                                        </tbody>
                                    </table>

                                    {/* I. IDENTIFIKASI */}
                                    <div className="mb-5">
                                        <h3 className="font-bold bg-slate-200 p-1 mb-2 uppercase">I. IDENTIFIKASI & KARAKTERISTIK</h3>
                                        <div className="ml-2">
                                            <p className="font-bold underline mb-1">A. Kesiapan Murid</p>
                                            <ul className="list-disc ml-5 mb-2 space-y-1">
                                                <li><strong>Kesiapan Konsep (Mindful):</strong> {formData.kesiapanKonsep}</li>
                                                <li><strong>Kesiapan Teknis (Psikomotor):</strong> {formData.kesiapanTeknis}</li>
                                                <li><strong>Kesiapan Mental (Joyful):</strong> {formData.kesiapanMental}</li>
                                            </ul>
                                            <p className="font-bold underline mb-1">B. Karakteristik Materi</p>
                                            <p className="mb-2 text-justify">{formData.karakteristikMateri}</p>
                                            <p className="font-bold underline mb-1">C. Dimensi Profil Lulusan</p>
                                            <p>{formData.dpl.join(", ")}</p>
                                        </div>
                                    </div>

                                    {/* II. DESAIN */}
                                    <div className="mb-5">
                                        <h3 className="font-bold bg-slate-200 p-1 mb-2 uppercase">II. DESAIN PEMBELAJARAN</h3>
                                        <div className="ml-2 space-y-1">
                                            <p><strong>Tujuan Pembelajaran:</strong> {formData.tujuanPembelajaran}</p>
                                            <p><strong>Indikator Kinerja Guru PMM:</strong> {formData.indikator}</p>
                                            <p><strong>Praktik Pedagogis (Model):</strong> {formData.metode}</p>
                                            <p><strong>Kemitraan Pembelajaran:</strong> {formData.kemitraan}</p>
                                        </div>
                                    </div>

                                    {/* III. PENGALAMAN BELAJAR */}
                                    <div className="mb-6">
                                        <h3 className="font-bold bg-slate-200 p-1 mb-2 uppercase">III. PENGALAMAN BELAJAR</h3>
                                        
                                        <div className="mb-3 ml-2">
                                            <p className="font-bold underline mb-1">1. Pendahuluan</p>
                                            <div className="ml-2">{formatText(formData.kegiatanAwal)}</div>
                                        </div>
                                        
                                        <div className="mb-3 ml-2">
                                            <p className="font-bold underline mb-1">2. Kegiatan Inti</p>
                                            <table className="w-full border-collapse border border-black mt-2">
                                                <thead>
                                                    <tr className="bg-slate-100">
                                                        <th className="border border-black p-2 text-left w-1/4">Tahapan</th>
                                                        <th className="border border-black p-2 text-left">Aktivitas</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr>
                                                        <td className="border border-black p-2 align-top font-bold">1. Memahami<br/><span className="text-xs font-normal">(Berkesadaran)</span></td>
                                                        <td className="border border-black p-2 align-top">{formatText(formData.kegiatanInti1)}</td>
                                                    </tr>
                                                    <tr>
                                                        <td className="border border-black p-2 align-top font-bold">2. Mengaplikasi<br/><span className="text-xs font-normal">(Bermakna)</span></td>
                                                        <td className="border border-black p-2 align-top">{formatText(formData.kegiatanInti2)}</td>
                                                    </tr>
                                                    <tr>
                                                        <td className="border border-black p-2 align-top font-bold">3. Merefleksi<br/><span className="text-xs font-normal">(Menggembirakan)</span></td>
                                                        <td className="border border-black p-2 align-top">{formatText(formData.kegiatanInti3)}</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>

                                        <div className="ml-2">
                                            <p className="font-bold underline mb-1">3. Penutup</p>
                                            <div className="ml-2">{formatText(formData.kegiatanPenutup)}</div>
                                        </div>
                                    </div>
                                    
                                    {/* IV. ASESMEN & SOLUSI */}
                                    <div className="page-break-inside-avoid">
                                        <h3 className="font-bold bg-slate-200 p-1 mb-2 uppercase">IV. ASESMEN & LAMPIRAN</h3>
                                        <div className="grid grid-cols-3 gap-2 mb-4">
                                            <div className="border border-black p-2">
                                                <p className="font-bold text-center border-b border-black pb-1 mb-1">Awal</p>
                                                <p className="text-xs">{formData.asesmenAwal}</p>
                                            </div>
                                            <div className="border border-black p-2">
                                                <p className="font-bold text-center border-b border-black pb-1 mb-1">Formatif</p>
                                                <p className="text-xs">{formData.asesmenFormatif}</p>
                                            </div>
                                            <div className="border border-black p-2">
                                                <p className="font-bold text-center border-b border-black pb-1 mb-1">Sumatif</p>
                                                <p className="text-xs">{formData.asesmenSumatif}</p>
                                            </div>
                                        </div>

                                        <p className="font-bold mb-1 mt-4">POSKO SOLUSI (Panduan Troubleshooting Siswa)</p>
                                        <table className="w-full border-collapse border border-black text-xs">
                                            <thead>
                                                <tr className="bg-slate-100">
                                                    <th className="border border-black p-2 text-left">Masalah yang Terjadi</th>
                                                    <th className="border border-black p-2 text-left">Mengapa Terjadi?</th>
                                                    <th className="border border-black p-2 text-left">Langkah Solusi</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {formData.troubleshooting.map((t, i) => (
                                                    <tr key={i}>
                                                        <td className="border border-black p-2 font-bold">{t.masalah}</td>
                                                        <td className="border border-black p-2">{t.penyebab}</td>
                                                        <td className="border border-black p-2">{t.solusi}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* A4 Document 2 - LAMPIRAN (PAGE BREAK) */}
                                <div className="bg-white text-black p-10 shadow-2xl mx-auto max-w-[210mm] min-h-[297mm] page-break mt-8 text-sm">
                                    <div className="text-center border-b-2 border-black pb-4 mb-6">
                                        <h1 className="text-xl font-bold uppercase">LAMPIRAN INSTRUMEN ASESMEN</h1>
                                    </div>

                                    <div className="space-y-8">
                                        {/* Awal */}
                                        <div>
                                            <div className="font-bold bg-slate-200 p-1 mb-2">1. ASESMEN AWAL (DIAGNOSTIK)</div>
                                            <div className="border border-black p-4 whitespace-pre-line">{formData.instrumenAwal}</div>
                                        </div>

                                        {/* Formatif - HTML TABLE */}
                                        <div>
                                            <div className="font-bold bg-slate-200 p-1 mb-2">2. LEMBAR OBSERVASI FORMATIF (Fokus: {formData.indikator})</div>
                                            <p className="mb-2 italic text-xs">Petunjuk: Beri tanda centang (✓) pada kolom tingkat penguasaan yang sesuai dengan kondisi murid.</p>
                                            
                                            <table className="w-full border-collapse border border-black text-sm mb-4">
                                                <thead>
                                                    <tr className="bg-slate-100">
                                                        <th className="border border-black p-2 w-[40%] text-left">Aspek yang Diamati</th>
                                                        <th className="border border-black p-2 text-center w-[15%]">Baru Memulai</th>
                                                        <th className="border border-black p-2 text-center w-[15%]">Berkembang</th>
                                                        <th className="border border-black p-2 text-center w-[15%]">Cakap</th>
                                                        <th className="border border-black p-2 text-center w-[15%]">Mahir</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {formData.instrumenFormatifAspek.split('\n').filter(a => a.trim() !== '').map((aspek, i) => (
                                                        <tr key={i}>
                                                            <td className="border border-black p-2">{aspek}</td>
                                                            <td className="border border-black p-2"></td>
                                                            <td className="border border-black p-2"></td>
                                                            <td className="border border-black p-2"></td>
                                                            <td className="border border-black p-2"></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>

                                            <div className="border border-black p-3 bg-slate-50">
                                                <p className="font-bold mb-1">Keterangan / Legend Penilaian:</p>
                                                <ul className="list-disc ml-5 space-y-1 text-xs">
                                                    {formData.instrumenFormatifLegend.split('\n').filter(l => l.trim() !== '').map((leg, idx) => (
                                                        <li key={idx}>{leg}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>

                                        {/* Sumatif */}
                                        <div className="page-break-inside-avoid">
                                            <div className="font-bold bg-slate-200 p-1 mb-2">3. INSTRUMEN SUMATIF</div>
                                            <div className="border border-black p-4 whitespace-pre-line">{formData.instrumenSumatif}</div>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const InputGroup = ({ label, name, val, change, placeholder }) => (
            <div>
                <label className="block text-sm font-bold mb-1">{label}</label>
                <input type="text" name={name} value={val} onChange={change} placeholder={placeholder} className="w-full p-2.5 rounded-lg border border-slate-300 dark:bg-slate-800 outline-none focus:border-brand-500 transition-all" />
            </div>
        );

        const AreaGroup = ({ label, name, val, change, rows, placeholder }) => (
            <div>
                <label className="block text-sm font-bold mb-1">{label}</label>
                <textarea name={name} value={val} onChange={change} rows={rows} placeholder={placeholder} className="w-full p-3 rounded-lg border border-slate-300 dark:bg-slate-800 outline-none focus:border-brand-500 transition-all leading-relaxed"></textarea>
            </div>
        );

        const ButtonPrimary = ({ onClick, children }) => (
            <button onClick={onClick} className="bg-brand-600 text-white px-6 py-2.5 rounded-lg font-bold hover:bg-brand-700 active:scale-95">{children}</button>
        );

        const ButtonSecondary = ({ onClick, children }) => (
            <button onClick={onClick} className="bg-white border px-6 py-2.5 rounded-lg font-bold hover:bg-slate-50 text-slate-700 dark:bg-slate-800 dark:text-white">{children}</button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
