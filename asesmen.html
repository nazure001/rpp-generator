        };

        // --- COMPONENTS ---
        const InputGroup = ({ label, name, val, change, placeholder }) => {

        const SafeIcon = ({ name, className = "w-4 h-4" }) => {
            return <span className="inline-flex items-center justify-center shrink-0" dangerouslySetInnerHTML={{ __html: `<i data-lucide="${name}" class="${className}"></i>` }} />;

                {icon && <SafeIcon name={icon} className="w-4 h-4" />}

        const ButtonSecondary = ({ children, onClick, icon }) => (
            <button onClick={onClick} className="flex items-center justify-center gap-2 bg-slate-800/80 hover:bg-slate-700 text-slate-200 font-semibold py-3 px-6 rounded-xl border border-white/10 hover:border-white/20 hover:-translate-y-0.5 transition-all duration-200">
                {icon && <SafeIcon name={icon} className="w-4 h-4" />}
                <span>{children}</span>
            </button>
        );

        // --- MAIN APPLICATION ---
        function App() {
            const generateUUID = () => {
                if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
                    return crypto.randomUUID();
                }
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            };
            const [step, setStep] = useState(1);
            const [selectedFase, setSelectedFase] = useState("Fase D (SMP/MTs Grade 7-9)");
            const [selectedMapel, setSelectedMapel] = useState("Ilmu Pengetahuan Alam (IPA)");
            const [selectedCP, setSelectedCP] = useState("");

            const [importStatus, setImportStatus] = useState({ type: null, message: "" });
            const [importedDraft, setImportedDraft] = useState(null);

            // --- MVP 6: Question Bank Parser State ---
            const [rawQuestionInput, setRawQuestionInput] = useState("");
            const [parsedQuestions, setParsedQuestions] = useState([]);
            const [parseStatus, setParseStatus] = useState({ type: null, message: "" });
            const [bankSoalQuestions, setBankSoalQuestions] = useState([]);
            const [editingQuestionIdx, setEditingQuestionIdx] = useState(null);

            // --- MVP 7: Review & Approval Workflow Helpers ---
            const getReviewSummary = (questionsList) => {
                const list = Array.isArray(questionsList) ? questionsList : [];
                return {
                    total: list.length,
                    validated: list.filter(q => q.reviewStatus === "Validated").length,
                    needsRevision: list.filter(q => q.reviewStatus === "Needs Revision").length,
                    approved: list.filter(q => q.reviewStatus === "Approved").length,
                    locked: list.filter(q => q.reviewStatus === "Locked").length,
                    isReady: list.length > 0 && list.every(q => q.reviewStatus === "Locked")
                };
            };

            const updateQuestionReview = (idx, patch) => {
                setBankSoalQuestions(prev => prev.map((q, i) => i === idx ? { ...q, ...patch } : q));
            };

            const getReviewStatusBadgeClass = (status) => {
                switch (status) {
                    case "Draft": return "bg-slate-500/20 text-slate-300 border border-slate-500/30";
                    case "Parsed": return "bg-violet-500/20 text-violet-300 border border-violet-500/30";
                    case "Validated": return "bg-blue-500/20 text-blue-300 border border-blue-500/30";
                    case "Needs Revision": return "bg-amber-500/20 text-amber-300 border border-amber-500/30";
                    case "Approved": return "bg-emerald-500/20 text-emerald-300 border border-emerald-500/30";
                    case "Locked": return "bg-rose-500/20 text-rose-300 border border-rose-500/30";
                    default: return "bg-slate-500/20 text-slate-300 border border-slate-500/30";
                }
            };

            const isQuestionLocked = (question) => question?.reviewStatus === "Locked";

            const handleReviewerFieldChange = (idx, field, value) => {
                if (bankSoalQuestions[idx]?.reviewStatus === "Locked") return;
                updateQuestionReview(idx, { [field]: value });
            };

            // --- MVP 8: Export Readiness Gate Helpers ---
            const getExportReadiness = () => {
                const list = Array.isArray(bankSoalQuestions) ? bankSoalQuestions : [];
                let score = 100;
                const warnings = [];
                const blockers = [];
                const missingMetadata = [];

                // 1. Total questions evaluation
                const totalQuestions = list.length;
                if (totalQuestions === 0) {
                    blockers.push("Tidak ada soal di dalam Bank Soal.");
                    score -= 30;
                }

                // 2. Question reviewStatus evaluation
                const needsRevision = list.filter(q => q.reviewStatus === "Needs Revision").length;
                const validatedOnly = list.filter(q => q.reviewStatus === "Validated").length;
                const approvedOnly = list.filter(q => q.reviewStatus === "Approved").length;
                const lockedCount = list.filter(q => q.reviewStatus === "Locked").length;

                if (needsRevision > 0) {
                    blockers.push(`Ada ${needsRevision} soal yang memerlukan revisi (Needs Revision).`);
                    score -= 20;
                }
                if (validatedOnly > 0) {
                    warnings.push(`Ada ${validatedOnly} soal yang belum ditinjau/disetujui (Validated saja).`);
                    score -= 15;
                }
                if (approvedOnly > 0) {
                    warnings.push(`Ada ${approvedOnly} soal yang disetujui (Approved) tetapi belum dikunci (Locked).`);
                    score -= 10;
                }

                // 3. Blueprint/kisi-kisi check
                const hasBlueprint = Array.isArray(formData.kisiKisi) && formData.kisiKisi.length > 0;
                if (!hasBlueprint) {
                    warnings.push("Matriks Kisi-Kisi Soal (Blueprint) kosong.");
                    score -= 10;
                }

                // 4. Metadata check
                const metaSchool = formData.sekolah || (importedDraft && importedDraft.metadata && importedDraft.metadata.school) || "";
                const metaTeacher = formData.guru || (importedDraft && importedDraft.metadata && importedDraft.metadata.teacher) || "";
                const metaSubject = selectedMapel || (importedDraft && importedDraft.metadata && importedDraft.metadata.subject) || "";
                const metaGrade = formData.kelas || (importedDraft && importedDraft.metadata && (importedDraft.metadata.grade || importedDraft.metadata.semester)) || "";
                const metaTopic = formData.topik || (importedDraft && importedDraft.metadata && importedDraft.metadata.topic) || "";

                if (!metaSchool.trim()) {
                    missingMetadata.push("Sekolah");
                    score -= 5;
                }
                if (!metaTeacher.trim()) {
                    missingMetadata.push("Guru");
                    score -= 5;
                }
                if (!metaSubject.trim()) {
                    missingMetadata.push("Mata Pelajaran");
                    score -= 5;
                }
                if (!metaGrade.trim()) {
                    missingMetadata.push("Kelas/Semester");
                    score -= 5;
                }
                if (!metaTopic.trim()) {
                    missingMetadata.push("Topik/Materi");
                    score -= 5;
                }

                if (missingMetadata.length > 0) {
                    blockers.push(`Metadata wajib belum lengkap: ${missingMetadata.join(", ")}.`);
                }

                // 5. Answer keys check for MC questions
                const missingKeysCount = list.filter(q => !q.answerKey || !q.answerKey.trim()).length;
                if (missingKeysCount > 0) {
                    blockers.push(`Ada ${missingKeysCount} soal Pilihan Ganda yang tidak memiliki kunci jawaban.`);
                    score -= 10;
                }

                // Ensure score doesn't go below 0
                score = Math.max(0, score);

                // Status rules
                let status = "READY";
                if (blockers.length > 0) {
                    status = "NOT_READY";
                } else if (warnings.length > 0 || lockedCount < totalQuestions) {
                    status = "WARNING";
                }

                const isReadyForFinalExport = status === "READY";

                return {
                    status,
                    score,
                    totalQuestions,
                    lockedQuestions: lockedCount,
                    approvedQuestions: approvedOnly,
                    needsRevisionQuestions: needsRevision,
                    validatedOnlyQuestions: validatedOnly,
                    missingMetadata,
                    warnings,
                    blockers,
                    isReadyForFinalExport
                };
            };

            const getReadinessBadgeClass = (status) => {
                switch (status) {
                    case "READY": return "bg-emerald-500/20 text-emerald-300 border border-emerald-500/30";
                    case "WARNING": return "bg-amber-500/20 text-amber-300 border border-amber-500/30";
                    case "NOT_READY": return "bg-rose-500/20 text-rose-300 border border-rose-500/30";
                    default: return "bg-slate-500/20 text-slate-300 border border-slate-500/30";
                }
            };

            // --- MVP 9: Google Form Export Blueprint Helpers ---
            const buildGoogleFormBlueprint = () => {
                const list = Array.isArray(bankSoalQuestions) && bankSoalQuestions.length > 0
                    ? bankSoalQuestions
                    : (Array.isArray(formData.soalPG) ? formData.soalPG.map(q => ({
                        id: generateUUID(),
                        number: q.no,
                        questionText: q.soal,
                        options: typeof q.opsi === 'object' && q.opsi !== null
                            ? Object.entries(q.opsi).map(([k, v]) => ({ key: k, text: v }))
                            : [],
                        answerKey: q.kunci,
                        explanation: q.pembahasan,
                        cognitiveLevel: formData.bloom || "C4",
                        indicator: "",
                        reviewStatus: "Validated",
                        score: 1
                      })) : []);

                const metaSchool = formData.sekolah || (importedDraft && importedDraft.metadata && importedDraft.metadata.school) || "";
                const metaSubject = selectedMapel || (importedDraft && importedDraft.metadata && importedDraft.metadata.subject) || "";
                const metaPhase = selectedFase || (importedDraft && importedDraft.metadata && importedDraft.metadata.phase) || "";
                const metaGrade = formData.kelas ? formData.kelas.split("/")[0].trim() : ((importedDraft && importedDraft.metadata && importedDraft.metadata.grade) || "");
                const metaSemesterRaw = formData.kelas && formData.kelas.includes("/") ? formData.kelas.split("/")[1].trim() : ((importedDraft && importedDraft.metadata && importedDraft.metadata.semester) || "Ganjil");
                const metaSemester = (metaSemesterRaw === "Ganjil" || metaSemesterRaw === "Genap") ? metaSemesterRaw : "Ganjil";
                const metaTopic = formData.topik || (importedDraft && importedDraft.metadata && importedDraft.metadata.topic) || "Materi";
                const metaTeacher = formData.guru || (importedDraft && importedDraft.metadata && importedDraft.metadata.teacher) || "";

                const items = list.map((q, idx) => {
                    const normalized = normalizeQuestionForAdvancedSchema(q, idx);
                    const mapping = getQuestionTypeGoogleFormMapping(normalized.type);
                    
                    let type = "multiple_choice";
                    if (normalized.type === "multiple_select" || normalized.type === "checkbox") {
                        type = "checkbox";
                    } else if (normalized.type === "true_false") {
                        type = "multiple_choice";
                    } else if (normalized.type === "matching" || normalized.type === "statement_table") {
                        type = "grid";
                    } else if (normalized.type === "short_answer") {
                        type = "short_answer";
                    } else if (normalized.type === "essay") {
                        type = "paragraph_text";
                    }

                    let optionsMapped = [];
                    if (normalized.type === "true_false") {
                        optionsMapped = [
                            { key: "Benar", text: "Benar", isCorrect: normalized.answerKey === "Benar" },
                            { key: "Salah", text: "Salah", isCorrect: normalized.answerKey === "Salah" }
                        ];
                    } else if (Array.isArray(normalized.options)) {
                        optionsMapped = normalized.options.map(opt => ({
                            key: opt.key,
                            text: opt.text || "",
                            isCorrect: (normalized.type === "multiple_select" || normalized.type === "checkbox")
                                ? (normalized.answerKeys || []).includes(opt.key)
                                : opt.key === normalized.answerKey
                        }));
                    }

                    return {
                        itemId: `q-${idx + 1}`,
                        type: type,
                        title: normalized.questionText || "",
                        helpText: normalized.stimulus || "",
                        required: true,
                        points: normalized.score || 1,
                        shuffleOptions: false,
                        options: optionsMapped,
                        answerKey: normalized.answerKey || "",
                        answerKeys: normalized.answerKeys || [],
                        matchingAnswerKey: normalized.matchingAnswerKey || [],
                        shortAnswerKeys: normalized.shortAnswerKeys || [],
                        rubric: normalized.rubric || [],
                        statements: normalized.statements || [],
                        pairs: normalized.pairs || [],
                        feedback: {
                        source: {
                            questionId: normalized.questionId || "",
                            number: normalized.number || idx + 1,
                            cognitiveLevel: normalized.cognitiveLevel || "C3",
                            indicator: normalized.indicator || "",
                            reviewStatus: normalized.reviewStatus || "Validated",
                            googleFormMapping: mapping,
                            originalType: normalized.type
                        }
                    };
                });

                const answerKey = items.map(item => ({
                    number: item.source.number,
                    questionId: item.source.questionId,
                    answer: item.answerKey,
                    answerKeys: item.answerKeys,
                    points: item.points
                }));

                const warnings = [];
                const blockers = [];

                if (items.length === 0) {
                    blockers.push("Tidak ada soal untuk diexport ke Google Form.");
                }

                items.forEach((item, idx) => {
                    const mapping = item.source.googleFormMapping;
                    if (!mapping.supported) {
                        warnings.push(`Soal #${idx + 1}: Tipe soal ${item.source.originalType || item.type} belum didukung penuh oleh Google Form Blueprint.`);
                    }
                    if (item.type === "multiple_choice" && (!item.answerKey || !item.answerKey.trim())) {
                        blockers.push(`Soal #${idx + 1} Pilihan Ganda tidak memiliki kunci jawaban.`);
                    }
                    if (item.type === "checkbox" && (item.answerKeys || []).length === 0) {
                        blockers.push(`Soal #${idx + 1} Pilihan Ganda Kompleks/Checkbox tidak memiliki kunci jawaban.`);
                    }
                    if (item.type === "multiple_choice" && item.options.length === 0) {
                        warnings.push(`Soal #${idx + 1} Pilihan Ganda tidak memiliki opsi jawaban.`);
                    }
                    if (item.type === "grid") {
                        warnings.push(`Soal #${idx + 1} adalah tipe Menjodohkan/Tabel Pernyataan. Ini akan diexport sebagai Grid Blueprint.`);
                    }
                    if (item.source.reviewStatus !== "Locked") {
                        warnings.push(`Soal #${idx + 1} belum dikunci (Locked) oleh Panitia.`);
                    }
                });

                const readiness = getExportReadiness();
                if (readiness.status !== "READY") {
                    warnings.push("Kesiapan paket asesmen utama belum READY.");
                }

                let status = "READY";
                if (blockers.length > 0) {
                    status = "NOT_READY";
                } else if (warnings.length > 0) {
                    status = "WARNING";
                }

                return {
                    exportType: "google_form_blueprint",
                    schemaVersion: "0.1.0",
                    generatedAt: new Date().toISOString(),
                    sourceAssessmentId: importedDraft ? importedDraft.assessmentId : generateUUID(),
                    form: {
                        title: `Asesmen: ${metaTopic}`,
                        description: `Asesmen Mata Pelajaran ${metaSubject} Kelas ${metaGrade} Semester ${metaSemester} - ${metaSchool}.`,
                        isQuiz: true,
                        collectEmail: false,
                        shuffleQuestions: false,
                        showProgressBar: true,
                        confirmationMessage: "Jawaban berhasil dikirim. Terima kasih.",
                        metadata: {
                            school: metaSchool,
                            subject: metaSubject,
                            grade: metaGrade,
                            semester: metaSemester,
                            topic: metaTopic,
                            teacher: metaTeacher,
                            academicYear: "2026/2027"
                        }
                    },
                    items,
                    answerKey,
                    validation: {
                        status,
                        warnings,
                        blockers
                    },
                    appsScriptHandoff: {
                        targetFunction: "createGoogleFormFromBlueprint",
                        requiresAuthorization: true,
                        notes: [
                            "This file is a blueprint only. It does not create a Google Form by itself.",
                            "Use this JSON as input for a future Google Apps Script integration."
                        ]
                    }
                };
            };

            const handleExportGoogleFormBlueprint = () => {
                const blueprint = buildGoogleFormBlueprint();
                const slugify = (str) => (str || "untitled").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
                const dateStr = new Date().toISOString().split("T")[0];
                const metaSubject = selectedMapel || (importedDraft && importedDraft.metadata && importedDraft.metadata.subject) || "mapel";
                const metaTopic = formData.topik || (importedDraft && importedDraft.metadata && importedDraft.metadata.topic) || "materi";

                if (blueprint.validation.status !== "READY") {
                    const notes = [...blueprint.validation.blockers, ...blueprint.validation.warnings];
                    const proceed = window.confirm(
                        `Google Form Blueprint belum READY.\n\nStatus: ${blueprint.validation.status}\n\nCatatan:\n- ${notes.join("\n- ")}\n\nTetap export blueprint?`
                    );
                    if (!proceed) return;
                }

                const blob = new Blob([JSON.stringify(blueprint, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const downloadAnchor = document.createElement("a");
                downloadAnchor.href = url;
                downloadAnchor.download = `google-form-blueprint-${slugify(metaSubject)}-${slugify(metaTopic)}-${dateStr}.json`;
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                document.body.removeChild(downloadAnchor);
                URL.revokeObjectURL(url);
            };

            // --- MVP 10: Advanced Question Type Schema Helpers ---
            const normalizeAdvancedQuestionType = (type) => {
                const t = String(type || "").toLowerCase().trim();
                if (t === "pilihan_ganda" || t === "multiple_choice" || t === "pilihan ganda") return "multiple_choice";
                if (t === "pg_kompleks" || t === "multiple_select" || t === "pilihan ganda kompleks") return "multiple_select";
                if (t === "checkbox") return "checkbox";
                if (t === "benar_salah" || t === "true_false" || t === "benar-salah") return "true_false";
                if (t === "menjodohkan" || t === "matching") return "matching";
                if (t === "isian_singkat" || t === "short_answer" || t === "isian singkat") return "short_answer";
                if (t === "uraian" || t === "essay") return "essay";
                if (t === "statement_table") return "statement_table";
                return "multiple_choice";
            };

            const normalizeQuestionForAdvancedSchema = (q, idx = 0) => {
                q = q || {};
                const normalizedType = normalizeAdvancedQuestionType(q.type);
                
                // Map difficulty target — only fall back to legacy difficulty if difficultyTarget is not set
                let diffTarget = q.difficultyTarget || "Medium";
                if (!q.difficultyTarget) {
                    if (q.difficulty === "Mudah" || q.difficulty === "Easy") diffTarget = "Easy";
                    if (q.difficulty === "Sedang" || q.difficulty === "Medium") diffTarget = "Medium";
                    if (q.difficulty === "Sukar" || q.difficulty === "Hard") diffTarget = "Hard";
                }

                // Options mapping — normalize string arrays to {key, text} objects
                let options = q.options || [];
                if (Array.isArray(options)) {
                    options = options.map(opt => {
                        if (typeof opt === 'string') {
                            const match = opt.match(/^([A-E])[\.\)]\s*(.*)/i);
                            return match ? { key: match[1].toUpperCase(), text: match[2].trim() } : { key: "", text: opt };
                        } else if (opt && typeof opt === 'object') {
                            let normalizedKey = "";
                            let normalizedText = "";
                            if (opt.key) {
                                normalizedKey = String(opt.key).trim().toUpperCase();
                            }
                            if (opt.text) {
                                normalizedText = String(opt.text).trim();
                                // If opt.text starts with A. or A) , extract the key and remove the prefix.
                                const match = normalizedText.match(/^([A-E])[\.\)]\s*(.*)/i);
                                if (match) {
                                    if (!normalizedKey) {
                                        normalizedKey = match[1].toUpperCase();
                                    }
                                    normalizedText = match[2].trim();
                                }
                            }
                            return {
                                ...opt,
                                key: normalizedKey,
                                text: normalizedText
                            };
                        }
                        return { key: "", text: String(opt || "") };
                    });
                }

                // Answer keys mapping
                let answerKeys = q.answerKeys || [];
                if ((normalizedType === "multiple_select" || normalizedType === "checkbox") && answerKeys.length === 0 && q.answerKey) {
                    answerKeys = [q.answerKey];
                }

                // Metadata mappings
                const metaSchool = formData.sekolah || (importedDraft && importedDraft.metadata && importedDraft.metadata.school) || "";
                const metaSubject = selectedMapel || (importedDraft && importedDraft.metadata && importedDraft.metadata.subject) || "";
                const metaGrade = formData.kelas || (importedDraft && importedDraft.metadata && (importedDraft.metadata.grade || importedDraft.metadata.semester)) || "";
                const metaTopic = formData.topik || (importedDraft && importedDraft.metadata && importedDraft.metadata.topic) || "";
                const metaCP = formData.capaianPembelajaran || selectedCP || (importedDraft && importedDraft.curriculumReference && importedDraft.curriculumReference.capaianPembelajaran) || "";
                const metaTP = formData.tujuanPembelajaran || (importedDraft && importedDraft.curriculumReference && importedDraft.curriculumReference.tujuanPembelajaran) || "";

                const defaultCardMetadata = {
                    phase: selectedFase || "",
                    grade: metaGrade,
                    subject: metaSubject,
                    topic: metaTopic,
                    learningObjective: metaTP,
                    indicator: q.indicator || "",
                    questionForm: normalizedType,
                    cognitiveLevel: q.cognitiveLevel || "C3",
                    difficultyTarget: diffTarget,
                    predictedDiscrimination: q.predictedDiscrimination || "Medium",
                    scoringGuide: q.explanation || "",
                    reviewNotes: q.reviewerNotes || ""
                };

                const defaultIllustration = {
                    mode: q.illustration?.mode || "none",
                    type: q.illustration?.type || "",
                    prompt: q.illustration?.prompt || "",
                    imageUrl: q.illustration?.imageUrl || q.image || "",
                    altText: q.illustration?.altText || ""
                };

                return {
                    questionId: q.questionId || q.id || generateUUID(),
                    id: q.id || q.questionId || generateUUID(),
                    number: q.number || q.no || (idx + 1),
                    subject: metaSubject,
                    grade: metaGrade,
                    topic: metaTopic,
                    type: normalizedType,

            // --- BROWSER-COMPATIBLE PARSER ADAPTER ---
            // NOTE: This adapter mirrors the logic of src/engines/questionParserEngine.js.
            // It is inlined here because asesmen.html is a static browser file without a build system.
            // Replace this with a proper module import when migrating to a build-system (e.g. Vite).
            const parseQuestionsFromText = (rawText) => {
                if (!rawText || typeof rawText !== 'string') return [];
                const normalizedText = rawText.replace(/\r\n/g, '\n').trim();
                if (!normalizedText) return [];

                const blockRegex = /(?:^|\n)(?=\d+[\.\)]\s+)/;
                const rawBlocks = normalizedText.split(blockRegex).map(b => b.trim()).filter(Boolean);
                const results = [];

                rawBlocks.forEach((block, idx) => {
                    const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
                    if (lines.length === 0) return;

                    let number = idx + 1;
                    const firstLine = lines[0];
                    const numMatch = firstLine.match(/^(\d+)[\.\)]\s*(.*)/);

                    let preOptionLines = [];
                    if (numMatch) {
                        number = parseInt(numMatch[1], 10);
                        if (numMatch[2]) preOptionLines.push(numMatch[2]);
                    } else {
                        preOptionLines.push(firstLine);
                    }

                    const optionsList = [];
                    let correctAnswer = "";
                    let indicator = "";
                    let cognitiveLevel = "";
                    let topic = "";
                    let explanation = "";
                    let score = 1;
                    let currentSection = "pre";
                    let currentOptionIndex = -1;

                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i];

                        const keyMatch = line.match(/^(?:Kunci(?: Jawaban)?|Jawaban)\s*:\s*(.*)/i);
                        if (keyMatch) {
                            const rawKey = keyMatch[1].trim();
                            const letterMatch = rawKey.match(/^([A-E])(?:\.|\)|\s|$)/i);
                            correctAnswer = letterMatch ? letterMatch[1].toUpperCase() : rawKey.toUpperCase();
                            currentSection = "meta"; continue;
                        }
                        const indMatch = line.match(/^Indikator(?: Soal)?\s*:\s*(.*)/i);
                        if (indMatch) { indicator = indMatch[1].trim(); currentSection = "meta"; continue; }

                        const levelMatch = line.match(/^(?:Level(?: Kognitif)?|Bloom|Ranah)\s*:\s*(.*)/i);
                        if (levelMatch) { cognitiveLevel = levelMatch[1].trim(); currentSection = "meta"; continue; }

                        const topicMatch = line.match(/^(?:Materi|Topik|Lingkup Materi)\s*:\s*(.*)/i);
                        if (topicMatch) { topic = topicMatch[1].trim(); currentSection = "meta"; continue; }

                        const pembMatch = line.match(/^(?:Pembahasan|Penjelasan|Keterangan)\s*:\s*(.*)/i);
                        if (pembMatch) { explanation = pembMatch[1].trim(); currentSection = "meta"; continue; }

                        const scoreMatch = line.match(/^(?:Skor|Bobot|Poin)\s*:\s*(.*)/i);
                        if (scoreMatch) { const n = parseFloat(scoreMatch[1]); if (!isNaN(n) && n > 0) score = n; currentSection = "meta"; continue; }

                        const optMatch = line.match(/^([A-Ea-e])[\.\)]\s+(.*)/);
                        if (optMatch) {
                            currentSection = "option";
                            optionsList.push({ key: optMatch[1].toUpperCase(), text: optMatch[2].trim() });
                            currentOptionIndex = optionsList.length - 1;
                            continue;
                        }

                        if (currentSection === "option" && currentOptionIndex >= 0) {
                            optionsList[currentOptionIndex].text += " " + line;
                        } else if (currentSection === "pre") {
                            preOptionLines.push(line);
                        }
                    }

                    let stimulus = "";
                    let questionText = "";
                    if (preOptionLines.length === 1) {
                        questionText = preOptionLines[0];
                    } else if (preOptionLines.length > 1) {
                        questionText = preOptionLines[preOptionLines.length - 1];
                        stimulus = preOptionLines.slice(0, preOptionLines.length - 1).join('\n');
                    }

                    results.push({
                        id: generateUUID(),
                        number,
                        type: "pilihan_ganda",
                        stimulus,
                        questionText,
                        options: optionsList,
                        answerKey: correctAnswer,
                        correctAnswer,
                        cognitiveLevel,
                        indicator,
                        material: topic,
                        score,
                        explanation,
                        validationStatus: "DRAFT",
                        validationErrors: [],
                        validationWarnings: []
                    });
                });

                return results;
            };

            // --- BROWSER-COMPATIBLE VALIDATOR ADAPTER ---

            const validateParsedQuestion = (q) => {
                const errors = [];
                const warnings = [];
                if (!q.questionText || !q.questionText.trim()) errors.push("Teks soal tidak boleh kosong.");
                if (!Array.isArray(q.options) || q.options.length < 4) errors.push("Soal pilihan ganda harus memiliki minimal 4 opsi.");
                if (!q.answerKey || !q.answerKey.trim()) {
                    errors.push("Kunci jawaban wajib diisi.");
                } else if (Array.isArray(q.options) && q.options.length > 0) {
                    const keys = q.options.map(o => (o.key || "").toUpperCase());
                    if (!keys.includes(q.answerKey.toUpperCase())) errors.push(`Kunci jawaban '${q.answerKey}' tidak ditemukan di opsi (${keys.join(", ")}).`);
                }
                const validLevels = ["C1", "C2", "C3", "C4", "C5", "C6"];
                const lvl = (q.cognitiveLevel || "").trim().toUpperCase().substring(0, 2);
                if (!lvl || !validLevels.includes(lvl)) warnings.push(`Level kognitif '${q.cognitiveLevel || "kosong"}' bukan C1-C6.`);
                if (!q.indicator || !q.indicator.trim()) warnings.push("Indikator soal sebaiknya diisi.");
                const status = errors.length > 0 ? "ERROR" : (warnings.length > 0 ? "WARNING" : "VALID");
                return { ...q, validationStatus: status, validationErrors: errors, validationWarnings: warnings };
            };

            // --- MVP 6: Parser Event Handlers ---

                        return;
                    }
                    setParsedQuestions(results);
                    setParseStatus({ type: "success", message: `${results.length} soal berhasil diparsing. Klik 'Validasi Soal' untuk memeriksa kualitas soal.` });
                    setEditingQuestionIdx(null);

            const handleValidateQuestions = () => {
                try {
                    if (parsedQuestions.length === 0) {
                        setParseStatus({ type: "error", message: "Belum ada soal yang diparsing. Klik 'Parse Soal' terlebih dahulu." });
                        return;
                    }
                    const allTexts = parsedQuestions.map(q => q.questionText);
                    const validated = parsedQuestions.map((q, idx) => {
                        const result = validateParsedQuestion(q);
                        const isDuplicate = q.questionText && q.questionText.trim() && allTexts.indexOf(q.questionText) !== idx;
                        if (isDuplicate) {
                            if (!Array.isArray(result.validationWarnings)) {
                                result.validationWarnings = [];
                            }
                            result.validationWarnings.push("Teks soal duplikat ditemukan.");
                        }
                        return result;
                    });
                    setParsedQuestions(validated);
                    const valid = validated.filter(q => q.validationStatus === "VALID").length;
                    const warn = validated.filter(q => q.validationStatus === "WARNING").length;
                    const err = validated.filter(q => q.validationStatus === "ERROR").length;
                    setParseStatus({ type: err > 0 ? "warning" : "success", message: `Validasi selesai: ${valid} VALID, ${warn} WARNING, ${err} ERROR.` });
                } catch (e) {
                    console.error("Error validating questions:", e);
                    setParseStatus({ type: "error", message: `Terjadi error saat memproses soal: ${e.message}` });
                }
            };

            const handleAddToBank = () => {
                try {
                    if (parsedQuestions.length === 0) {
                        setParseStatus({ type: "error", message: "Belum ada soal untuk ditambahkan. Parse dan validasi soal terlebih dahulu." });

                    const hasDraft = parsedQuestions.some(q => q.validationStatus === "DRAFT");

                        });

                    }
                    const toAdd = parsedQuestions.filter(q => q.validationStatus !== "ERROR");
                    const skipped = parsedQuestions.length - toAdd.length;
                    if (toAdd.length === 0) {
                        setParseStatus({ type: "error", message: "Semua soal memiliki error. Perbaiki soal terlebih dahulu sebelum menambahkan ke bank soal." });
                        return;

                    setParsedQuestions([]);

            const handleClearParser = () => {

            const handleRemoveParsed = (idx) => {

            const validateAssessmentDraft = (data) => {

                const checkProp = (obj, prop, path) => {
                    if (!obj || !(prop in obj) || obj[prop] === undefined || obj[prop] === null) {

                    }
                };
                checkProp(data, 'assessmentId', 'assessmentId');

                if (data.metadata) {

                }
                if (!Array.isArray(normalized.teacherPreferences.cognitiveLevels) || normalized.teacherPreferences.cognitiveLevels.length === 0) {
                    normalized.teacherPreferences.cognitiveLevels = ["C2", "C3", "C4"];
                }
                return normalized;
            };

            const generateInitialBlueprintFromDraft = (data) => {
                const curr = data.curriculumReference || {};
                const meta = data.metadata || {};
                const pref = data.teacherPreferences || {};

                const tpText = curr.tujuanPembelajaran || `Tujuan Pembelajaran untuk topik ${meta.topic || "Materi"}`;
                const materiText = curr.lingkupMateri || meta.topic || "Materi Pokok";
                const cogLevels = (Array.isArray(pref.cognitiveLevels) && pref.cognitiveLevels.length > 0)
                    ? pref.cognitiveLevels : ["C2", "C3", "C4"];
                const qTypes = (Array.isArray(pref.questionTypes) && pref.questionTypes.length > 0)
                    ? pref.questionTypes : ["pilihan_ganda", "pg_kompleks", "uraian"];

                let tpParts = tpText.split(/(?<=[.!?])\s+|;/).map(s => s.trim()).filter(s => s.length > 5);
                if (tpParts.length === 0) {
                    tpParts = [tpText];
                }

                const blueprint = [];
                const targetRowCount = Math.max(5, tpParts.length);
                const indicatorVerbs = {
                    "C1": "mengidentifikasi dan menyebutkan definisi",
                    "C2": "menjelaskan konsep dasar dan karakteristik",
                    "C3": "menerapkan prinsip dalam menyelesaikan persoalan atau situasi",
                    "C4": "menganalisis hubungan antar komponen pada peristiwa",
                    "C5": "mengevaluasi serta memberikan argumen logis terkait",
                    "C6": "merancang atau memodifikasi solusi kreatif atas"
                };

                for (let i = 0; i < targetRowCount; i++) {
                    const currentTp = tpParts[i % tpParts.length];
                    const cog = cogLevels[i % cogLevels.length];
                    const qType = qTypes[i % qTypes.length];
                    const cogKey = String(cog).substring(0, 2).toUpperCase();
                    const verb = indicatorVerbs[cogKey] || "mengidentifikasi dan menerapkan konsep";
                    
                    const indicator = `Disajikan konteks pembelajaran atau ilustrasi relevan, peserta didik mampu ${verb} ${materiText.toLowerCase()} dengan tepat.`;
                    
                    blueprint.push({
                        no: i + 1,
                        tp: currentTp,
                        materi: materiText,
                        indicator: indicator,
                        cognitiveLevel: cog,
                        questionType: qType,
                        weight: Math.round(100 / targetRowCount),
                        estimatedQuestionCount: qType === 'uraian' ? 1 : 2
                    });
                }

                const totalW = blueprint.reduce((acc, row) => acc + row.weight, 0);
                if (totalW !== 100 && blueprint.length > 0) {
                    blueprint[0].weight += (100 - totalW);
                }

                return blueprint;
            };

            const applyImportedDraft = (data, isFromLessonPlan = false) => {
                const normalized = normalizeImportedDraft(data);
                const meta = normalized.metadata || {};
                const curr = normalized.curriculumReference || {};
                const plan = normalized.assessmentPlan || {};

                const schoolVal = meta.school || formData.sekolah;
                const teacherVal = meta.teacher || formData.guru;
                const subjectVal = meta.subject || selectedMapel;
                const gradeVal = meta.grade || "";
                const semesterVal = meta.semester || "";
                const kelasVal = gradeVal && semesterVal ? `${gradeVal} / ${semesterVal}` : (gradeVal || semesterVal || formData.kelas);
                const phaseVal = meta.phase || selectedFase;
                const topicVal = meta.topic || formData.topik;
                const elementVal = meta.curriculumElement || "";
                const cpVal = curr.capaianPembelajaran || selectedCP;
                const tpVal = curr.tujuanPembelajaran || "";
                const lingkupVal = curr.lingkupMateri || "";

                if (phaseVal && DATABASE_KURIKULUM[phaseVal]) {
                    setSelectedFase(phaseVal);
                }
                if (subjectVal && DATABASE_KURIKULUM[phaseVal || selectedFase]?.[subjectVal]) {
                    setSelectedMapel(subjectVal);
                }
                if (cpVal) {
                    setSelectedCP(cpVal);
                }

                const bloomVal = (normalized.teacherPreferences && normalized.teacherPreferences.cognitiveLevels && normalized.teacherPreferences.cognitiveLevels[0]) 
                    ? (Object.keys(TAKSONOMI_BLOOM).find(k => k.includes(normalized.teacherPreferences.cognitiveLevels[0])) || formData.bloom)
                    : formData.bloom;

                const initialBlueprint = generateInitialBlueprintFromDraft(normalized);

                setFormData(prev => ({
                    ...prev,
                    sekolah: schoolVal,
                    guru: teacherVal,
                    kelas: kelasVal,
                    topik: topicVal,
                    bloom: bloomVal,
                    curriculumElement: elementVal,
                    capaianPembelajaran: cpVal,
                    tujuanPembelajaran: tpVal,
                    lingkupMateri: lingkupVal,
                    asesmenAwal: plan.diagnostic || "",
                    asesmenFormatif: plan.formative || "",
                    asesmenSumatif: plan.summative || "",
                    soalPG: [],
                    soalUraian: [],
                    kisiKisi: initialBlueprint.map((item) => ({
                        no: item.no,
                        tp: item.tp,
                        materi: item.materi,
                        indikator: item.indicator,
                        indicator: item.indicator,
                        level: item.cognitiveLevel,
                        cognitiveLevel: item.cognitiveLevel,
                        bentuk: item.questionType,
                        questionType: item.questionType,
                        bobot: String(item.weight),
                        weight: item.weight,
                        estimatedQuestionCount: item.estimatedQuestionCount
                    }))
                }));

                setImportedDraft(normalized);
                setImportStatus({
                    type: "success",
                    message: isFromLessonPlan
                        ? "RPP JSON berhasil dikonversi menjadi draft asesmen dan kisi-kisi awal telah dibuat."
                        : "Draft asesmen berhasil diimpor dan kisi-kisi awal telah dibuat."
                });
            };

            const handleFileImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                try {
                    const data = await readJsonFile(file);
                    const fileType = detectImportedJsonType(data);

                    if (fileType === "unknown") {
                        setImportStatus({
                            type: "error",
                            message: "Format JSON tidak dikenali. Gunakan file assessment-draft-*.json atau lesson-plan-*.json hasil ekspor aplikasi."
                        });
                        return;
                    }

                    let draftData = data;
                    let isFromLessonPlan = false;

                    if (fileType === "lesson_plan") {
                        draftData = convertLessonPlanToAssessmentDraft(data);
                        isFromLessonPlan = true;
                    }

                    const validation = validateAssessmentDraft(draftData);
                    if (!validation.isValid) {
                        setImportStatus({
                            type: "error",
                            message: `Field wajib tidak lengkap: ${validation.errors.join(", ")}.`
                        });
                        return;
                    }

                    applyImportedDraft(draftData, isFromLessonPlan);
                } catch (err) {
                    setImportStatus({
                        type: "error",
                        message: `Gagal membaca file: ${err.message}`
                    });
                }
            };

            const handleExportFinalJSON = () => {
                const readiness = getExportReadiness();
                if (readiness.status !== "READY") {
                    const notes = [...readiness.blockers, ...readiness.warnings];
                    const proceed = window.confirm(
                        `Paket asesmen belum READY.\n\nStatus: ${readiness.status}\nSkor: ${readiness.score}/100\n\nCatatan:\n- ${notes.join("\n- ")}\n\nTetap export JSON?`
                    );
                    if (!proceed) return;
                }

                const mapQuestionValidationStatus = (status) => {
                    if (status === "VALID" || status === "WARNING") return "Valid";
                    if (status === "ERROR") return "Revision Required";
                    return "Pending";
                };

                const normalizeCognitiveLevel = (level) => {
                    const normalized = String(level || "").substring(0, 2).toUpperCase();
                    return ["C1", "C2", "C3", "C4", "C5", "C6"].includes(normalized)
                        ? normalized
                        : "C3";
                };

                const slugify = (str) => (str || "untitled").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
                const dateStr = new Date().toISOString().split("T")[0];
                const metaSchool = formData.sekolah || (importedDraft && importedDraft.metadata && importedDraft.metadata.school) || "";
                const metaSubject = selectedMapel || (importedDraft && importedDraft.metadata && importedDraft.metadata.subject) || "";
                const metaPhase = selectedFase || (importedDraft && importedDraft.metadata && importedDraft.metadata.phase) || "";
                const metaGrade = formData.kelas ? formData.kelas.split("/")[0].trim() : ((importedDraft && importedDraft.metadata && importedDraft.metadata.grade) || "");
                const metaSemesterRaw = formData.kelas && formData.kelas.includes("/") ? formData.kelas.split("/")[1].trim() : ((importedDraft && importedDraft.metadata && importedDraft.metadata.semester) || "Ganjil");
                const metaSemester = (metaSemesterRaw === "Ganjil" || metaSemesterRaw === "Genap") ? metaSemesterRaw : "Ganjil";
                const metaTopic = formData.topik || (importedDraft && importedDraft.metadata && importedDraft.metadata.topic) || "Materi";
                const metaCP = formData.capaianPembelajaran || selectedCP || (importedDraft && importedDraft.curriculumReference && importedDraft.curriculumReference.capaianPembelajaran) || "";
                const metaTP = formData.tujuanPembelajaran || (importedDraft && importedDraft.curriculumReference && importedDraft.curriculumReference.tujuanPembelajaran) || "";

                const finalData = {
                    assessmentId: importedDraft ? importedDraft.assessmentId : generateUUID(),
                    // Flat required fields (assessment.schema.json)
                    title: `Asesmen Komprehensif: ${metaTopic}`,
                    school: metaSchool,
                    subject: metaSubject,
                    grade: metaGrade,
                    phase: metaPhase,
                    semester: metaSemester,
                    academicYear: "2026/2027",
                    curriculumReferences: {
                        cpText: metaCP,
                        tpList: [metaTP].filter(Boolean),
                        pmmFocus: formData.indikatorPMM || ""
                    },
                    status: "Validated",
                    // Nested fields (for import round-trip compatibility)
                    source: importedDraft && importedDraft.source ? importedDraft.source : {
                        type: "lesson_plan_export",
                        app: "Smart RPP Generator Pro"
                    },
                    metadata: importedDraft && importedDraft.metadata ? importedDraft.metadata : {
                        school: metaSchool,
                        teacher: formData.guru || "",
                        subject: metaSubject,
                        grade: metaGrade,
                        phase: metaPhase,
                        semester: metaSemester,
                        topic: metaTopic,
                        curriculumElement: formData.curriculumElement || ""
                    },
                    curriculumReference: importedDraft && importedDraft.curriculumReference ? importedDraft.curriculumReference : {
                        capaianPembelajaran: metaCP,
                        tujuanPembelajaran: metaTP,
                        lingkupMateri: formData.lingkupMateri || ""
                    },
                    assessmentPlan: importedDraft && importedDraft.assessmentPlan ? importedDraft.assessmentPlan : {
                        diagnostic: formData.asesmenAwal || "",
                        formative: formData.asesmenFormatif || "",
                        summative: formData.asesmenSumatif || ""
                    },
                    teacherPreferences: importedDraft && importedDraft.teacherPreferences ? importedDraft.teacherPreferences : {
                        cognitiveLevels: [formData.bloom || "C4"],
                        questionTypes: ["pilihan_ganda", "uraian"],
                        questionCount: formData.soalPG.length + formData.soalUraian.length
                    },
                    blueprint: formData.kisiKisi.map((item, idx) => ({
                        no: item.no || idx + 1,
                        number: item.no || idx + 1,
                        tp: item.tp || "",
                        materi: item.materi || formData.lingkupMateri || formData.topik || "",
                        indicator: item.indicator || item.indikator || "",
                        bloomLevel: item.cognitiveLevel || item.level || "",
                        cognitiveLevel: item.cognitiveLevel || item.level || "",
                        questionType: item.questionType || item.bentuk || "",
                        weight: Number(String(item.weight || item.bobot || "20").replace(/[^0-9]/g, "")) || 20,
                        estimatedQuestionCount: item.estimatedQuestionCount || (String(item.questionType || item.bentuk).toLowerCase().includes("uraian") ? 1 : 2)
                    })),
                    questions: bankSoalQuestions.length > 0
                        ? bankSoalQuestions.map((q, idx) => {
                            const normalized = normalizeQuestionForAdvancedSchema(q, idx);
                            return {
                                ...normalized,
                                type: normalized.type === "multiple_choice" ? "Pilihan Ganda" : (normalized.type === "essay" ? "Uraian" : normalized.type),
                                options: Array.isArray(normalized.options)
                                    ? normalized.options.reduce((acc, o) => {
                                        if (o && o.key) acc[o.key] = o.text || "";
                                        return acc;
                                      }, {})
                                    : normalized.options,
                                correctAnswer: normalized.answerKey || "",
                                validationStatus: mapQuestionValidationStatus(normalized.validationStatus)
                            };
                          })
                        : importedDraft ? [] : [
                        ...formData.soalPG.map((q, idx) => {
                            const rawQ = {
                                type: "multiple_choice",
                                no: q.no,
                                soal: q.soal,
                                options: typeof q.opsi === 'object' && q.opsi !== null ? Object.entries(q.opsi).map(([k, v]) => ({ key: k, text: v })) : [],
                                answerKey: q.kunci,
                                explanation: q.pembahasan,
                                cognitiveLevel: formData.bloom || "C4"
                            };
                            const normalized = normalizeQuestionForAdvancedSchema(rawQ, idx);
                            return {
                                ...normalized,
                                type: "Pilihan Ganda",
                                options: normalized.options,
                                correctAnswer: normalized.answerKey || "",
                                validationStatus: "Valid"
                            };
                        }),
                        ...formData.soalUraian.map((q, idx) => {
                            const rawQ = {
                                type: "essay",
                                no: q.no + formData.soalPG.length,
                                soal: q.soal,
                                explanation: q.rambu,
                                score: q.skorMaks,
                                cognitiveLevel: q.level || "C5"
                            };
                            const normalized = normalizeQuestionForAdvancedSchema(rawQ, idx + formData.soalPG.length);
                            return {
                                ...normalized,
                                type: "Uraian",
                                options: {},
                                correctAnswer: normalized.answerKey || "",
                                validationStatus: "Valid"
                            };
                        })
                    ],
                    answerKey: bankSoalQuestions.length > 0
                        ? bankSoalQuestions.map(q => ({ number: q.number, answer: q.answerKey, explanation: q.explanation || "" }))
                        : importedDraft ? [] : [
                        ...formData.soalPG.map(q => ({
                            number: q.no,
                            answer: q.kunci,
                            explanation: q.pembahasan
                        })),
                        ...formData.soalUraian.map(q => ({
                            number: q.no + formData.soalPG.length,
                            answer: q.rambu,
                            explanation: `Skor maksimal: ${q.skorMaks}`
                        }))
                    ],
                    scoringRules: {
                        maxScore: 100,
                        passingScoreKKTP: 75,
                        rubrics: formData.rubrikSikap || []
                    },
                    imageAssets: [],
                    validationReport: {
                        ...(importedDraft && importedDraft.validationReport ? importedDraft.validationReport : {}),
                        status: "VALIDATED",
                        isValidated: true,
                        bloomDistribution: bankSoalQuestions.reduce((acc, q) => {
                            const lvl = (q.cognitiveLevel || "unknown").substring(0, 2).toUpperCase();
                            acc[lvl] = (acc[lvl] || 0) + 1;
                            return acc;
                        }, {}),
                        warnings: []
                    },
                    reviewReport: {
                        totalQuestions: bankSoalQuestions.length > 0 ? getReviewSummary(bankSoalQuestions).total : (formData.soalPG.length + formData.soalUraian.length),
                        validated: bankSoalQuestions.length > 0 ? getReviewSummary(bankSoalQuestions).validated : (formData.soalPG.length + formData.soalUraian.length),
                        needsRevision: bankSoalQuestions.length > 0 ? getReviewSummary(bankSoalQuestions).needsRevision : 0,
                        approved: bankSoalQuestions.length > 0 ? getReviewSummary(bankSoalQuestions).approved : 0,
                        locked: bankSoalQuestions.length > 0 ? getReviewSummary(bankSoalQuestions).locked : 0,
                        isReadyForFinalExport: bankSoalQuestions.length > 0 ? getReviewSummary(bankSoalQuestions).isReady : false
                    },
                    exportReadiness: {
                        status: readiness.status,
                        score: readiness.score,
                        totalQuestions: readiness.totalQuestions,
                        lockedQuestions: readiness.lockedQuestions,
                        approvedQuestions: readiness.approvedQuestions,
                        needsRevisionQuestions: readiness.needsRevisionQuestions,
                        validatedOnlyQuestions: readiness.validatedOnlyQuestions,
                        missingMetadata: readiness.missingMetadata,
                        warnings: readiness.warnings,
                        blockers: readiness.blockers,
                        isReadyForFinalExport: readiness.isReadyForFinalExport,
                        checkedAt: new Date().toISOString()
                    },
                    exportTargets: ["JSON"],
                    exportedAt: new Date().toISOString(),
                    appName: "AssessmentHub AI",
                    exportType: "assessment_final"
                };
                const blob = new Blob([JSON.stringify(finalData, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const downloadAnchor = document.createElement("a");
                downloadAnchor.href = url;
                downloadAnchor.download = `assessment-final-${slugify(metaSubject || "mapel")}-${slugify(metaTopic || "topik")}-${dateStr}.json`;
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                document.body.removeChild(downloadAnchor);
                URL.revokeObjectURL(url);
            };

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    {/* TOP NAVIGATION BAR */}
                    <header className="sticky top-0 z-40 glass-panel border-b border-white/10 no-print">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-brand-600 p-3 rounded-2xl shadow-lg shadow-brand-600/30">
                                    <SafeIcon name="award" className="w-7 h-7 text-white" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
                                        Smart Assessment Generator Pro
                                    </h1>
                                    <p className="text-xs text-brand-400 font-medium flex items-center gap-1.5 mt-0.5">
                                        <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                                        Standar Kurikulum Merdeka BSKAP 046/H/KR/2026 & PMM
                                    </p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <a href="index.html" className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white px-4 py-2.5 rounded-xl border border-white/10 text-xs font-semibold transition-all shadow-md">
                                    <SafeIcon name="arrow-left" className="w-4 h-4" />
                                    <span>Kembali ke RPP Generator</span>
                                </a>
                                {step === 5 && (
                                    <div className="flex items-center gap-2">
                                        <button onClick={handleExportFinalJSON} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-xl font-bold text-xs shadow-lg shadow-indigo-600/30 transition-all">
                                            <SafeIcon name="download" className="w-4 h-4" />
                                            <span>Export Assessment Final JSON</span>
                                        </button>
                                        <button onClick={handlePrint} className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold text-xs shadow-lg shadow-emerald-600/30 hover:scale-105 transition-all">
                                            <SafeIcon name="printer" className="w-4 h-4" />
                                            <span>Cetak Dokumen / PDF</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* EXPERIMENTAL PROTOTYPE BANNER */}
                    <div className="bg-amber-500/20 border-b border-amber-500/30 text-amber-300 px-6 py-2.5 text-xs font-semibold text-center no-print flex items-center justify-center gap-2">
                        <SafeIcon name="alert-triangle" className="w-4 h-4 text-amber-400 inline" />
                        <span>Experimental Prototype — not yet connected to RPP JSON export or Google Form Builder.</span>
                    </div>

                    {/* STEP PROGRESS INDICATOR */}
                    <div className="max-w-7xl mx-auto px-6 py-6 w-full no-print">
                        <div className="glass-panel rounded-2xl p-4">
                            <div className="flex flex-wrap items-center justify-between gap-2">
                                {[
                                    { num: 1, label: 'Konfigurasi & Kurikulum', icon: 'settings' },
                                    { num: 2, label: 'Kisi-Kisi Soal', icon: 'table-2' },
                                    { num: 3, label: 'Bank Soal PG & Esai', icon: 'file-text' },
                                    { num: 4, label: 'Rubrik Observasi PMM', icon: 'check-square' },
                                    { num: 5, label: 'Pratinjau & Cetak A4', icon: 'printer' }
                                ].map((item) => (
                                    <button 
                                        key={item.num} 
                                        onClick={() => setStep(item.num)}
                                        className={`flex items-center gap-2.5 px-4 py-2.5 rounded-xl text-xs font-bold transition-all ${step === item.num ? 'bg-gradient-to-r from-brand-600 to-brand-700 text-white shadow-lg shadow-brand-600/30 scale-105' : step > item.num ? 'bg-slate-800/80 text-emerald-400 border border-emerald-500/30' : 'bg-slate-900/50 text-slate-400 hover:bg-slate-800 border border-white/5'}`}
                                    >
                                        <div className={`w-6 h-6 rounded-lg flex items-center justify-center text-xs ${step === item.num ? 'bg-white/20 text-white' : step > item.num ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-800 text-slate-400'}`}>
                                            {step > item.num ? <SafeIcon name="check" className="w-3.5 h-3.5" /> : item.num}
                                        </div>
                                        <span>{item.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* MAIN CONTENT AREA */}
                    <main className="max-w-7xl mx-auto px-6 pb-16 flex-grow w-full">
                        {/* TAHAP 1: KONFIGURASI & KURIKULUM */}
                        {step === 1 && (
                            <div className="glass-panel rounded-3xl p-8 space-y-8 no-print animate-fade-in">
                                <div className="border-b border-white/10 pb-5">
                                    <h2 className="text-xl font-bold text-white flex items-center gap-2.5">
                                        <SafeIcon name="settings" className="w-6 h-6 text-brand-400" />
                                        <span>Tahap 1: Konfigurasi Identitas & Pemetaan Kurikulum</span>
                                    </h2>
                                    <p className="text-sm text-slate-400 mt-1">
                                        Pilih jenjang fase, mata pelajaran, dan karakteristik asesmen. Sistem otomatis merumuskan butir soal kontekstual.
                                    </p>
                                </div>

                                <div className="bg-slate-900/60 border border-brand-500/30 rounded-2xl p-5 space-y-3">
                                    <div className="flex items-center justify-between flex-wrap gap-3">
                                        <div>
                                            <h3 className="text-sm font-bold text-white flex items-center gap-2">
                                                <SafeIcon name="upload-cloud" className="w-5 h-5 text-brand-400" />
                                                <span>Import Draft Asesmen JSON</span>
                                            </h3>
                                            <p className="text-xs text-slate-400 mt-0.5">
                                                Unggah file assessment-draft-*.json hasil ekspor dari Smart RPP Generator untuk mengisi metadata dan membuat kisi-kisi awal.
                                            </p>
                                        </div>
                                        <div>
                                            <label className="cursor-pointer bg-brand-600 hover:bg-brand-500 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all shadow-lg shadow-brand-600/30 flex items-center gap-2">
                                                <SafeIcon name="file-input" className="w-4 h-4" />
                                                <span>Pilih Berkas JSON...</span>
                                                <input type="file" accept=".json,application/json" onChange={handleFileImport} className="hidden" />
                                            </label>
                                        </div>
                                    </div>
                                    {importStatus.message && (
                                        <div className={`p-3 rounded-xl text-xs font-medium flex items-center gap-2.5 ${importStatus.type === 'error' ? 'bg-rose-500/20 text-rose-300 border border-rose-500/30' : 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30'}`}>
                                            <SafeIcon name={importStatus.type === 'error' ? 'alert-circle' : 'check-circle'} className="w-4 h-4 shrink-0" />
                                            <span>{importStatus.message}</span>
                                        </div>
                                    )}
                                    {importStatus.type === 'success' && importedDraft && (
                                        <div className="bg-slate-900/80 border border-emerald-500/30 rounded-2xl p-4 space-y-3 animate-fade-in text-xs">
