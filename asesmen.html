                        ckp: "Konsisten menunjukkan perilaku selaras dengan prinsip kedisiplinan dan kesepakatan kelas tanpa perlu pengingat.",
                        mhr: "Proaktif menjadi teladan bagi rekan sekelas, mampu mengajak orang lain mematuhi kesepakatan dengan empati."
                    },
                    {
                        aspek: "Kolaborasi & Tanggung Jawab Tugas",
                        bm: "Cenderung pasif dalam kerja kelompok, menunggu instruksi, dan belum menyelesaikan beban tugas tepat waktu.",
                        bkg: "Mengerjakan bagian tugasnya dengan cukup baik meskipun terkadang memerlukan bantuan atau pengarahan ketua kelompok.",
                        ckp: "Melaksanakan tanggung jawab mandiri dan kelompok dengan tuntas, berkontribusi aktif dalam diskusi pembahasan materi.",
                        mhr: "Mampu memimpin pembagian peran, memfasilitasi solusi saat kelompok menemui jalan buntu, dan menjamin mutu tugas."
                    },
                    {
                        aspek: "Kemandirian & Berpikir Kritis (HOTS)",
                        bm: "Hanya menyalin jawaban atau ide dasar tanpa berusaha menganalisis permasalahan secara mandiri.",
                        bkg: "Mampu menjawab pertanyaan dasar dengan tepat, namun membutuhkan pijakan (scaffolding) untuk soal analisis kompleks.",
                        ckp: "Mampu menganalisis masalah, menyusun argumen logis, dan menyelesaikan penugasan HOTS dengan mandiri.",
                        mhr: "Menghasilkan gagasan baru yang kreatif, mampu mengevaluasi berbagai sudut pandang, dan merefleksikan proses belajarnya."
                    }
                ];
            }
        };

        // --- COMPONENTS ---
        const InputGroup = ({ label, name, val, change, placeholder }) => {
            const id = useId();
            return (
                <div className="flex flex-col gap-1.5">
                    <label htmlFor={id} className="text-xs font-semibold text-slate-300 ml-1 uppercase tracking-wider">{label}</label>
                    <input id={id} type="text" name={name} value={val} onChange={change} placeholder={placeholder} className="w-full p-3 rounded-xl text-sm outline-none shadow-inner" />
                </div>
            );
        };

        const AreaGroup = ({ label, name, val, change, rows, placeholder }) => {
            const id = useId();
            return (
                <div className="flex flex-col gap-1.5 w-full">
                    <label htmlFor={id} className="text-xs font-semibold text-slate-300 ml-1 uppercase tracking-wider">{label}</label>
                    <textarea id={id} name={name} value={val} onChange={change} rows={rows || 4} placeholder={placeholder} className="w-full p-3 rounded-xl text-sm outline-none leading-relaxed shadow-inner"></textarea>
                </div>
            );
        };

        const ButtonPrimary = ({ children, onClick, icon, disabled }) => (
            <button onClick={onClick} disabled={disabled} className={`flex items-center justify-center gap-2 bg-gradient-to-r from-brand-600 to-brand-700 hover:from-brand-500 hover:to-brand-600 text-white font-semibold py-3 px-6 rounded-xl shadow-lg shadow-brand-600/30 hover:shadow-brand-600/50 hover:-translate-y-0.5 transition-all duration-200 ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`}>
                {icon && <i data-lucide={icon} className="w-4 h-4"></i>}
                <span>{children}</span>
            </button>
        );

        const ButtonSecondary = ({ children, onClick, icon }) => (
            <button onClick={onClick} className="flex items-center justify-center gap-2 bg-slate-800/80 hover:bg-slate-700 text-slate-200 font-semibold py-3 px-6 rounded-xl border border-white/10 hover:border-white/20 hover:-translate-y-0.5 transition-all duration-200">
                {icon && <i data-lucide={icon} className="w-4 h-4"></i>}
                <span>{children}</span>
            </button>
        );

        // --- MAIN APPLICATION ---
        function App() {
            const [step, setStep] = useState(1);
            const [selectedFase, setSelectedFase] = useState("Fase D (SMP/MTs Grade 7-9)");
            const [selectedMapel, setSelectedMapel] = useState("Ilmu Pengetahuan Alam (IPA)");
            const [selectedCP, setSelectedCP] = useState("");

            const [importStatus, setImportStatus] = useState({ type: null, message: "" });
            const [importedDraft, setImportedDraft] = useState(null);

            const [formData, setFormData] = useState({
                sekolah: "SMP Negeri 2 Karangtengah",
                guru: "Purwa Umbara, S.Pd.",
                nipGuru: "19880101 201001 1 001",
                kepalaSekolah: "Dr. H. Ahmad Sudirman, M.Pd.",
                nipKepalaSekolah: "19750505 199802 1 002",
                kelas: "VII (Tujuh) / Ganjil",
                topik: "Hukum Newton dan Dinamika Gerak",
                jenisAsesmen: "Paket Komprehensif (Diagnostik, Formatif, Sumatif)",
                bloom: "C4 - Menganalisis / HOTS (Analyzing)",
                indikatorPMM: "Disiplin Positif",
                curriculumElement: "",
                capaianPembelajaran: "",
                tujuanPembelajaran: "",
                lingkupMateri: "",
                asesmenAwal: "",
                asesmenFormatif: "",
                asesmenSumatif: "",
                
                // Generated Content
                kisiKisi: [],
                soalPG: [],
                soalUraian: [],
                rubrikSikap: [],
                catatanUmum: "Instrumen asesmen ini dirancang berbasis prinsip Deep Learning dan pedoman asesmen Kurikulum Merdeka BSKAP No. 046/H/KR/2026."
            });

            const generateUUID = () => {
                if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
                    return crypto.randomUUID();
                }
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            };

            // Update Mapel options when Fase changes
            useEffect(() => {
                if (!importedDraft && DATABASE_KURIKULUM[selectedFase]) {
                    const firstMapel = Object.keys(DATABASE_KURIKULUM[selectedFase])[0];
                    setSelectedMapel(firstMapel);
                }
            }, [selectedFase]);

            // Update CP when Mapel changes
            useEffect(() => {
                if (!importedDraft && DATABASE_KURIKULUM[selectedFase] && DATABASE_KURIKULUM[selectedFase][selectedMapel]) {
                    const elem = DATABASE_KURIKULUM[selectedFase][selectedMapel];
                    const firstElemKey = Object.keys(elem)[0];
                    setSelectedCP(`${firstElemKey}: ${elem[firstElemKey]}`);
                }
            }, [selectedFase, selectedMapel]);

            // Trigger generation whenever parameters change
            useEffect(() => {
                let kisi = AssessmentEngine.generateKisiKisi(selectedFase, selectedMapel, formData.topik, formData.bloom, selectedCP);
                if (importedDraft) {
                    if (Array.isArray(importedDraft.blueprint) && importedDraft.blueprint.length > 0) {
                        kisi = importedDraft.blueprint.map((item, idx) => ({
                            no: item.number || idx + 1,
                            tp: item.tujuanPembelajaran || item.tp || formData.tujuanPembelajaran || `Tujuan Pembelajaran ${idx + 1}`,
                            indikator: item.indicator || item.indikator || `Indikator soal untuk ${formData.topik}`,
                            level: item.cognitiveLevel || item.bloomLevel || "C3 (Mengaplikasikan)",
                            bentuk: item.questionType || item.bentuk || "Pilihan Ganda (PG)",
                            bobot: String(item.weight || "20").replace("%", "")
                        }));
                    } else if (importedDraft.curriculumReference?.tujuanPembelajaran || formData.tujuanPembelajaran) {
                        const tpText = importedDraft.curriculumReference?.tujuanPembelajaran || formData.tujuanPembelajaran;
                        kisi.forEach(row => { row.tp = tpText; });
                    }
                }
                const pg = AssessmentEngine.generateSoalPG(formData.topik, selectedMapel, formData.bloom);
                const uraian = AssessmentEngine.generateSoalUraian(formData.topik, selectedMapel, formData.bloom);
                const rubrik = AssessmentEngine.generateRubrikSikap(formData.indikatorPMM);

                setFormData(prev => ({
                    ...prev,
                    kisiKisi: kisi,
                    soalPG: pg,
                    soalUraian: uraian,
                    rubrikSikap: rubrik
                }));
            }, [selectedFase, selectedMapel, formData.topik, formData.bloom, formData.indikatorPMM, selectedCP, importedDraft]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [step, importStatus]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handlePrint = () => {
                window.print();
            };

            // Customizing Kisi-Kisi item
            const handleKisiChange = (index, field, value) => {
                const updated = [...formData.kisiKisi];
                updated[index][field] = value;
                setFormData(prev => ({ ...prev, kisiKisi: updated }));
            };

            const handleFileImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);

                        const requiredFields = [
                            'assessmentId',
                            'metadata',
                            'curriculumReference',
                            'assessmentPlan',
                            'teacherPreferences',
                            'validationReport'
                        ];

                        const missingFields = requiredFields.filter(field => !(field in data));
                        if (missingFields.length > 0) {
                            setImportStatus({
                                type: "error",
                                message: `Gagal Impor: Field wajib tidak lengkap. Hilang: ${missingFields.join(", ")}.`
                            });
                            return;
                        }

                        if (!data.validationReport || !data.validationReport.status) {
                            setImportStatus({
                                type: "error",
                                message: "Gagal Impor: validationReport.status tidak ditemukan dalam berkas JSON."
                            });
                            return;
                        }

                        const meta = data.metadata || {};
                        const curr = data.curriculumReference || {};
                        const plan = data.assessmentPlan || {};

                        const schoolVal = meta.school || formData.sekolah;
                        const teacherVal = meta.teacher || formData.guru;
                        const subjectVal = meta.subject || selectedMapel;
                        const gradeVal = meta.grade || "";
                        const semesterVal = meta.semester || "";
                        const kelasVal = gradeVal && semesterVal ? `${gradeVal} / ${semesterVal}` : (gradeVal || semesterVal || formData.kelas);
                        const phaseVal = meta.phase || selectedFase;
                        const topicVal = meta.topic || formData.topik;
                        const elementVal = meta.curriculumElement || "";
                        const cpVal = curr.capaianPembelajaran || selectedCP;
                        const tpVal = curr.tujuanPembelajaran || "";
                        const lingkupVal = curr.lingkupMateri || "";

                        if (phaseVal && DATABASE_KURIKULUM[phaseVal]) {
                            setSelectedFase(phaseVal);
                        }
                        if (subjectVal && DATABASE_KURIKULUM[phaseVal || selectedFase]?.[subjectVal]) {
                            setSelectedMapel(subjectVal);
                        }
                        if (cpVal) {
                            setSelectedCP(cpVal);
                        }

                        const bloomVal = (data.teacherPreferences && data.teacherPreferences.cognitiveLevels && data.teacherPreferences.cognitiveLevels[0]) 
                            ? (Object.keys(TAKSONOMI_BLOOM).find(k => k.includes(data.teacherPreferences.cognitiveLevels[0])) || formData.bloom)
                            : formData.bloom;

                        setFormData(prev => ({
                            ...prev,
                            sekolah: schoolVal,
                            guru: teacherVal,
                            kelas: kelasVal,
                            topik: topicVal,
                            bloom: bloomVal,
                            curriculumElement: elementVal,
                            capaianPembelajaran: cpVal,
                            tujuanPembelajaran: tpVal,
                            lingkupMateri: lingkupVal,
                            asesmenAwal: plan.diagnostic || "",
                            asesmenFormatif: plan.formative || "",
                            asesmenSumatif: plan.summative || ""
                        }));

                        setImportedDraft(data);
                        setImportStatus({
                            type: "success",
                            message: `Berhasil mengimpor draft asesmen "${topicVal}" (ID: ${data.assessmentId}). Matriks kisi-kisi dan identitas telah otomatis diperbarui.`
                        });
                    } catch (err) {
                        setImportStatus({
                            type: "error",
                            message: `File JSON tidak valid atau rusak: ${err.message}`
                        });
                    }
                };
                reader.readAsText(file);
            };

            const handleExportFinalJSON = () => {
                const slugify = (str) => (str || "untitled").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
                const dateStr = new Date().toISOString().split("T")[0];
                const finalData = {
                    assessmentId: importedDraft ? importedDraft.assessmentId : generateUUID(),
                    sourceLessonPlanId: importedDraft && importedDraft.sourceLessonPlanId ? importedDraft.sourceLessonPlanId : generateUUID(),
                    title: `Asesmen Komprehensif: ${formData.topik}`,
                    school: formData.sekolah || "",
                    subject: selectedMapel || "",
                    grade: formData.kelas ? formData.kelas.split("/")[0].trim() : "",
                    phase: selectedFase || "",
                    semester: formData.kelas && formData.kelas.includes("/") ? formData.kelas.split("/")[1].trim() : "",
                    academicYear: "2026/2027",
                    curriculumReferences: {
                        cpText: formData.capaianPembelajaran || selectedCP || "",
                        tpList: [formData.tujuanPembelajaran || (formData.kisiKisi[0] ? formData.kisiKisi[0].tp : "")].filter(Boolean),
                        pmmFocus: formData.indikatorPMM || ""
                    },
                    teacherPreferences: importedDraft && importedDraft.teacherPreferences ? importedDraft.teacherPreferences : {
                        dominantBloomLevel: formData.bloom || "C4",
                        multipleChoiceCount: formData.soalPG.length,
                        essayCount: formData.soalUraian.length,
                        durationMinutes: 90
                    },
                    blueprint: formData.kisiKisi.map(item => ({
                        number: item.no,
                        tp: item.tp,
                        indicator: item.indikator,
                        bloomLevel: item.level,
                        questionType: item.bentuk,
                        weight: Number(String(item.bobot).replace(/[^0-9]/g, "")) || 20
                    })),
                    questions: [
                        ...formData.soalPG.map(q => ({
                            questionId: generateUUID(),
                            number: q.no,
                            type: "multiple_choice",
                            questionText: q.soal,
                            options: q.opsi,
                            correctAnswer: q.kunci,
                            explanation: q.pembahasan,
                            cognitiveLevel: formData.bloom || "C4"
                        })),
                        ...formData.soalUraian.map(q => ({
                            questionId: generateUUID(),
                            number: q.no + formData.soalPG.length,
                            type: "essay",
                            questionText: q.soal,
                            guidelines: q.rambu,
                            maxScore: q.skorMaks,
                            cognitiveLevel: q.level || "C5"
                        }))
                    ],
                    answerKey: {
                        multipleChoice: formData.soalPG.map(q => ({
                            number: q.no,
                            answer: q.kunci,
                            explanation: q.pembahasan
                        })),
                        essay: formData.soalUraian.map(q => ({
                            number: q.no + formData.soalPG.length,
                            guidelines: q.rambu,
                            maxScore: q.skorMaks
                        }))
                    },
                    scoringRules: {
                        maxScore: 100,
                        passingScoreKKTP: 75,
                        rubrics: formData.rubrikSikap
                    },
                    imageAssets: [],
                    validationReport: importedDraft && importedDraft.validationReport ? {
                        ...importedDraft.validationReport,
                        status: "VALIDATED",
                        isValidated: true,
                        bloomDistribution: { "C2": "20%", "C3": "20%", "C4": "20%", "C5": "20%", "C6": "20%" },
                        warnings: []
                    } : {
                        status: "VALIDATED",
                        isValidated: true,
                        bloomDistribution: { "C2": "20%", "C3": "20%", "C4": "20%", "C5": "20%", "C6": "20%" },
                        warnings: []
                    },
                    exportTargets: ["JSON"],
                    status: "Validated"
                };
                const blob = new Blob([JSON.stringify(finalData, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const downloadAnchor = document.createElement("a");
                downloadAnchor.href = url;
                downloadAnchor.download = `assessment-final-${slugify(selectedMapel || "mapel")}-${slugify(formData.topik || "topik")}-${dateStr}.json`;
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                document.body.removeChild(downloadAnchor);
                URL.revokeObjectURL(url);
            };

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    {/* TOP NAVIGATION BAR */}
                    <header className="sticky top-0 z-40 glass-panel border-b border-white/10 no-print">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-gradient-to-br from-brand-500 to-brand-700 p-3 rounded-2xl shadow-lg shadow-brand-500/30 flex items-center justify-center">
                                    <i data-lucide="award" className="w-7 h-7 text-white"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
                                        Smart Assessment Generator Pro
                                    </h1>
                                    <p className="text-xs text-brand-400 font-medium flex items-center gap-1.5 mt-0.5">
                                        <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                                        Standar Kurikulum Merdeka BSKAP 046/H/KR/2026 & PMM
                                    </p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <a href="index.html" className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white px-4 py-2.5 rounded-xl border border-white/10 text-xs font-semibold transition-all shadow-md">
                                    <i data-lucide="arrow-left" className="w-4 h-4"></i>
                                    <span>Kembali ke RPP Generator</span>
                                </a>
                                {step === 5 && (
                                    <div className="flex items-center gap-2">
                                        <button onClick={handleExportFinalJSON} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-xl font-bold text-xs shadow-lg shadow-indigo-600/30 transition-all">
                                            <i data-lucide="download" className="w-4 h-4"></i>
                                            <span>Export Assessment Final JSON</span>
                                        </button>
                                        <button onClick={handlePrint} className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold text-xs shadow-lg shadow-emerald-600/30 hover:scale-105 transition-all">
                                            <i data-lucide="printer" className="w-4 h-4"></i>
                                            <span>Cetak Dokumen / PDF</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* EXPERIMENTAL PROTOTYPE BANNER */}
                    <div className="bg-amber-500/20 border-b border-amber-500/30 text-amber-300 px-6 py-2.5 text-xs font-semibold text-center no-print flex items-center justify-center gap-2">
                        <i data-lucide="alert-triangle" className="w-4 h-4 text-amber-400 inline"></i>
                        <span>Experimental Prototype — not yet connected to RPP JSON export or Google Form Builder.</span>
                    </div>

                    {/* STEP PROGRESS INDICATOR */}
                    <div className="max-w-7xl mx-auto px-6 py-6 w-full no-print">
                        <div className="glass-panel rounded-2xl p-4">
                            <div className="flex flex-wrap items-center justify-between gap-2">
                                {[
                                    { num: 1, label: 'Konfigurasi & Kurikulum', icon: 'settings' },
                                    { num: 2, label: 'Kisi-Kisi Soal', icon: 'table-2' },
                                    { num: 3, label: 'Bank Soal PG & Esai', icon: 'file-text' },
                                    { num: 4, label: 'Rubrik Observasi PMM', icon: 'check-square' },
                                    { num: 5, label: 'Pratinjau & Cetak A4', icon: 'printer' }
                                ].map((item) => (
                                    <button 
                                        key={item.num} 
                                        onClick={() => setStep(item.num)}
                                        className={`flex items-center gap-2.5 px-4 py-2.5 rounded-xl text-xs font-bold transition-all ${step === item.num ? 'bg-gradient-to-r from-brand-600 to-brand-700 text-white shadow-lg shadow-brand-600/30 scale-105' : step > item.num ? 'bg-slate-800/80 text-emerald-400 border border-emerald-500/30' : 'bg-slate-900/50 text-slate-400 hover:bg-slate-800 border border-white/5'}`}
                                    >
                                        <div className={`w-6 h-6 rounded-lg flex items-center justify-center text-xs ${step === item.num ? 'bg-white/20 text-white' : step > item.num ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-800 text-slate-400'}`}>
                                            {step > item.num ? <i data-lucide="check" className="w-3.5 h-3.5"></i> : item.num}
                                        </div>
                                        <span>{item.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* MAIN CONTENT AREA */}
                    <main className="max-w-7xl mx-auto px-6 pb-16 flex-grow w-full">
                        {/* TAHAP 1: KONFIGURASI & KURIKULUM */}
                        {step === 1 && (
                            <div className="glass-panel rounded-3xl p-8 space-y-8 no-print animate-fade-in">
                                <div className="border-b border-white/10 pb-5">
                                    <h2 className="text-xl font-bold text-white flex items-center gap-2.5">
                                        <i data-lucide="settings" className="w-6 h-6 text-brand-400"></i>
                                        <span>Tahap 1: Konfigurasi Identitas & Pemetaan Kurikulum</span>
                                    </h2>
                                    <p className="text-sm text-slate-400 mt-1">
                                        Pilih jenjang fase, mata pelajaran, dan karakteristik asesmen. Sistem otomatis merumuskan butir soal kontekstual.
                                    </p>
                                </div>

                                <div className="bg-slate-900/60 border border-brand-500/30 rounded-2xl p-5 space-y-3">
                                    <div className="flex items-center justify-between flex-wrap gap-3">
                                        <div>
                                            <h3 className="text-sm font-bold text-white flex items-center gap-2">
                                                <i data-lucide="upload-cloud" className="w-5 h-5 text-brand-400"></i>
                                                <span>Import Draft Asesmen JSON</span>
                                            </h3>
                                            <p className="text-xs text-slate-400 mt-0.5">
                                                Unggah berkas <code className="bg-slate-800 text-brand-300 px-1.5 py-0.5 rounded">assessment-draft-*.json</code> dari RPP Generator untuk menyusun rancangan asesmen dan kisi-kisi.
                                            </p>
                                        </div>
                                        <div>
                                            <label className="cursor-pointer bg-brand-600 hover:bg-brand-500 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all shadow-lg shadow-brand-600/30 flex items-center gap-2">
                                                <i data-lucide="file-input" className="w-4 h-4"></i>
                                                <span>Pilih Berkas JSON...</span>
                                                <input type="file" accept=".json,application/json" onChange={handleFileImport} className="hidden" />
                                            </label>
                                        </div>
                                    </div>
                                    {importStatus.message && (
                                        <div className={`p-3 rounded-xl text-xs font-medium flex items-center gap-2.5 ${importStatus.type === 'error' ? 'bg-rose-500/20 text-rose-300 border border-rose-500/30' : 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30'}`}>
                                            <i data-lucide={importStatus.type === 'error' ? 'alert-circle' : 'check-circle'} className="w-4 h-4 shrink-0"></i>
                                            <span>{importStatus.message}</span>
                                        </div>
                                    )}
                                </div>
